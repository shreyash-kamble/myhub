<script type="text/babel">
const {useState,useCallback,useMemo,useRef,useEffect}=React;

const LOCS=['Arena','Boiler Shop','O2 City Hall','TR','Freight Island','NSU','NUFC','Other'];
const EXTRA_LOCS=['BBC Radio','Playhouse'];
const LCOL={'TR':'#00e5ff','NSU':'#fb923c','NUFC':'#94a3b8','Boiler Shop':'#ff8c00','O2 City Hall':'#3dffa0','Arena':'#ffd600','Other':'#f472b6','Freight Island':'#ff6b35','BBC Radio':'#ff4444','Playhouse':'#e879f9'};
const LICO={'TR':'🎪','NSU':'🎓','NUFC':'⚽','Boiler Shop':'🔧','O2 City Hall':'🎵','Arena':'🏟️','Other':'📍','Freight Island':'📦','BBC Radio':'📻','Playhouse':'🎭'};

// Generate a consistent color for custom venues not in LCOL
const OTHER_PALETTE=['#f472b6','#a78bfa','#34d399','#fb923c','#38bdf8','#e879f9','#facc15','#4ade80','#f87171','#60a5fa','#c084fc','#2dd4bf'];
function venueColor(name){
  if(LCOL[name])return LCOL[name];
  let h=0;for(let i=0;i<name.length;i++){h=(h*31+name.charCodeAt(i))>>>0;}
  return OTHER_PALETTE[h%OTHER_PALETTE.length];
}

const uid=()=>crypto.randomUUID();

function useSwipeRef(onLeft,onRight){
  const cbL=useRef(onLeft),cbR=useRef(onRight);
  useEffect(()=>{cbL.current=onLeft;},[onLeft]);
  useEffect(()=>{cbR.current=onRight;},[onRight]);
  const cleanupRef=useRef(null);
  const ref=useCallback(el=>{
    if(cleanupRef.current){cleanupRef.current();cleanupRef.current=null;}
    if(!el)return;
    let sx=null,sy=null,fired=false;
    function onTS(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;fired=false;}
    function onTM(e){
      if(sx===null)return;
      const dx=e.touches[0].clientX-sx;
      const dy=e.touches[0].clientY-sy;
      if(Math.abs(dx)>10&&Math.abs(dx)>Math.abs(dy)){e.preventDefault();}
    }
    function onTE(e){
      if(sx===null||fired)return;
      const dx=e.changedTouches[0].clientX-sx;
      const dy=e.changedTouches[0].clientY-sy;
      if(Math.abs(dx)>40&&Math.abs(dx)>Math.abs(dy)){
        fired=true;
        if(dx<0)cbL.current();else cbR.current();
      }
      sx=null;sy=null;
    }
    el.addEventListener('touchstart',onTS,{passive:true});
    el.addEventListener('touchmove',onTM,{passive:false});
    el.addEventListener('touchend',onTE,{passive:true});
    cleanupRef.current=()=>{
      el.removeEventListener('touchstart',onTS);
      el.removeEventListener('touchmove',onTM);
      el.removeEventListener('touchend',onTE);
    };
  },[]);
  return ref;
}
const fmtH=h=>{const w=Math.floor(h),m=Math.round((h-w)*60);return m?`${w}h ${m}m`:`${w}h`;};
const fmtP=n=>`£${n.toFixed(2)}`;
const RATE=12.5;
const shiftPay=s=>s.hours*RATE;
function calcH(s,e){
  if(!s||!e)return 0;
  const[sh,sm]=s.split(':').map(Number);let[eh,em]=e.split(':').map(Number);
  let a=sh*60+sm,b=eh*60+em;
  if(e==='0:00'||e==='00:00')b=1440;
  if(b<=a)b+=1440;
  return Math.round((b-a)/60*100)/100;
}
function wkNum(ds){const d=new Date(ds);d.setHours(0,0,0,0);d.setDate(d.getDate()+3-(d.getDay()+6)%7);const w1=new Date(d.getFullYear(),0,4);return 1+Math.round(((d-w1)/86400000-(3-(w1.getDay()+6)%7))/7);}
function isoWkYear(ds){const d=new Date(ds);d.setHours(0,0,0,0);d.setDate(d.getDate()+3-(d.getDay()+6)%7);return d.getFullYear();}
function mkKey(ds){return ds.slice(0,7);}
function mkName(mk){const[y,m]=mk.split('-');return`${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]} ${y}`;}
function dayName(ds){return['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date(ds).getDay()];}
function localDateStr(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${day}`;}
const TODAY=localDateStr(new Date());

const STORE_KEY='shifts_v4';
function loadStore(){try{const r=localStorage.getItem(STORE_KEY);if(r){const d=JSON.parse(r);if(!d.weeklyTarget)d.weeklyTarget=0;if(!d.actualPay)d.actualPay={};return d;}}catch(e){}return{shifts:[],weeklyTarget:0,actualPay:{}};}
function saveStore(s){try{localStorage.setItem(STORE_KEY,JSON.stringify(s));}catch(e){}}

function calDays(mk){
  const[y,m]=mk.split('-').map(Number);
  const first=new Date(y,m-1,1);
  const totalDays=new Date(y,m,0).getDate();
  const off=(first.getDay()+6)%7; // Mon=0 offset
  const days=[];
  const pad=n=>String(n).padStart(2,'0');
  // blank cells for padding (no date)
  for(let i=0;i<off;i++){days.push({date:null,cur:false});}
  // actual month days — build date string directly to avoid UTC shift
  for(let i=1;i<=totalDays;i++){days.push({date:`${y}-${pad(m)}-${pad(i)}`,cur:true});}
  // trailing blank cells to complete the grid row
  while(days.length%7){days.push({date:null,cur:false});}
  return days;
}

/* ── 24H TIME INPUT ── */
function TimeInput({value, onChange, placeholder='HH:MM', className}){
  const[raw,setRaw]=useState(value||'');
  const ref=useRef(null);

  // Keep in sync if parent value changes (e.g. reset)
  useEffect(()=>{setRaw(value||'');},[value]);

  function handleChange(e){
    let v=e.target.value.replace(/[^0-9:]/g,'');
    // Auto-insert colon after 2 digits
    if(v.length===2&&raw.length===1&&!v.includes(':'))v=v+':';
    // Limit to HH:MM
    if(v.length>5)return;
    setRaw(v);
    // Validate & emit
    const m=v.match(/^([01]?\d|2[0-3]):([0-5]\d)$/);
    if(m){
      const hh=m[1].padStart(2,'0'),mm=m[2];
      onChange(`${hh}:${mm}`);
    } else if(v===''){
      onChange('');
    }
  }

  function handleBlur(){
    // Try to fix partial input on blur
    const m=raw.match(/^([01]?\d|2[0-3]):([0-5]\d)$/);
    if(m){
      const fixed=`${m[1].padStart(2,'0')}:${m[2]}`;
      setRaw(fixed);
      onChange(fixed);
    } else if(raw&&!raw.match(/^([01]?\d|2[0-3]):([0-5]\d)$/)){
      // invalid — clear
      setRaw('');onChange('');
    }
  }

  function handleKeyDown(e){
    if(e.key==='Backspace'&&raw.endsWith(':'))setRaw(raw.slice(0,-1));
  }

  return(
    <input
      ref={ref}
      className={className}
      type="text"
      inputMode="numeric"
      placeholder={placeholder}
      value={raw}
      onChange={handleChange}
      onBlur={handleBlur}
      onKeyDown={handleKeyDown}
      maxLength={5}
      autoComplete="off"
    />
  );
}

@keyframes swipeHint{0%{opacity:0;transform:translateX(0)}20%{opacity:.7;transform:translateX(-6px)}50%{opacity:.7;transform:translateX(6px)}80%{opacity:.7;transform:translateX(-4px)}100%{opacity:0;transform:translateX(0)}}
.swipe-hint{display:flex;align-items:center;justify-content:center;gap:.4rem;font-family:var(--font-m);font-size:.52rem;color:var(--dim);letter-spacing:.08em;padding:.3rem 0 .1rem;pointer-events:none;animation:swipeHint 1.8s ease 0.5s 1 forwards;opacity:0;}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:100;display:flex;align-items:center;justify-content:center;padding:1.25rem;}
.mdl{background:var(--bg);border:1px solid var(--border);padding:1rem;width:100%;max-width:340px;animation:pop .2s ease;border-radius:9px;max-height:90vh;overflow-y:auto;}
.mdl-t{font-family:var(--font-d);font-size:1.6rem;letter-spacing:.06em;margin-bottom:.25rem;color:var(--text);}
.mdl-s{font-family:var(--font-m);font-size:.65rem;color:var(--muted);margin-bottom:.75rem;}
.mdl-box{background:var(--s1);border:1px solid var(--border);padding:.85rem 1rem;border-radius:7px;margin-bottom:.5rem;}
.mdl-l{font-family:var(--font-m);font-size:.65rem;color:var(--accent);letter-spacing:.1em;margin-bottom:.45rem;}
.mdl-l+.mdl-l{margin-top:.65rem;}
.mdl-i-sm{width:100%;background:var(--s3);border:1px solid var(--border2);color:var(--text);font-family:var(--font-m);font-size:.88rem;padding:.5rem .65rem;border-radius:4px;}
.mdl-i-sm:focus{outline:none;border-color:var(--accent);}

.mdl-lgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.3rem;}
.mdl-lbtn{display:flex;align-items:center;gap:.25rem;padding:.45rem .35rem;border:1px solid var(--border2);background:var(--s2);cursor:pointer;font-family:var(--font-b);font-size:.8rem;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;border-radius:4px;transition:all .15s;}
.mdl-lbtn.sel{background:rgba(255,255,255,.05);}
.mdl-notes{width:100%;background:var(--s3);border:1px solid var(--border2);color:var(--text);font-family:var(--font-m);font-size:.78rem;padding:.48rem .65rem;border-radius:4px;resize:none;line-height:1.4;}
.mdl-notes:focus{outline:none;border-color:var(--accent);}
.mdl-notes::placeholder{color:var(--muted);}
.mdl-save{width:100%;font-family:var(--font-d);font-size:1.3rem;letter-spacing:.1em;padding:.75rem;border:none;cursor:pointer;background:var(--green);color:#fff;border-radius:5px;margin-top:.25rem;transition:all .15s;}
.mdl-save:disabled{background:var(--green);color:#fff;cursor:default;opacity:1;}
.mdl-save.edit{background:var(--green);color:#fff;}
.mdl-del{width:100%;font-family:var(--font-d);font-size:1rem;letter-spacing:.08em;padding:.6rem;border:none;background:var(--red);color:#fff;cursor:pointer;border-radius:5px;margin-top:.4rem;transition:all .15s;}
`;

/* ── EDIT MODAL ── */
function EditModal({shift, onSave, onDelete, onClose}){
  const isNew=!shift.id;
  const[date,setDate]=useState(shift.date);
  const[s0,setS0]=useState(shift.start||'');
  const[e0,setE0]=useState(shift.end||'');
  // If existing shift has a loc not in LOCS or EXTRA_LOCS, treat as custom Other
  const knownLoc=shift.loc&&(LOCS.includes(shift.loc)||EXTRA_LOCS.includes(shift.loc));
  const isExtraLoc=EXTRA_LOCS.includes(shift.loc||'');
  const[loc,setLoc]=useState(!shift.loc?'':(knownLoc?shift.loc:'Other'));
  const[otherName,setOtherName]=useState(knownLoc||!shift.loc?'':(shift.loc||''));
  const[note,setNote]=useState(shift.note||'');
  const[showMoreLocs,setShowMoreLocs]=useState(isExtraLoc);
  const finalLoc=loc==='Other'?(otherName.trim()||'Other'):(loc||'');
  const pH=calcH(s0,e0),pP=pH*RATE;
  function doSave(){
    if(!s0||!e0||calcH(s0,e0)<=0)return;
    const h=calcH(s0,e0);
    onSave({...shift,id:shift.id||uid(),date,start:s0,end:e0,loc:finalLoc,hours:h,note});
  }
  return(
    <div className="mo" onClick={onClose}>
      <div className="mdl" onClick={e=>e.stopPropagation()}>
        <div className="mdl-t">{isNew?'ADD SHIFT':'EDIT SHIFT'}</div>
        <div className="mdl-s">{isNew?`${dayName(date)} · ${+date.slice(8)} ${mkName(date.slice(0,7))}`:'Update the details below'}</div>

        {/* DATE box */}
        <div className="mdl-box">
          <div className="mdl-l">DATE</div>
          <input className="mdl-i-sm" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
        </div>

        {/* SHIFT TIME box */}
        <div className="mdl-box">
          <div className="mdl-l">SHIFT TIME</div>
          <div className="mdl-trow">
            <TimeInput className="mdl-i-sm" value={s0} onChange={setS0} placeholder="09:00"/>
            <div className="mdl-tsep">→</div>
            <TimeInput className="mdl-i-sm" value={e0} onChange={setE0} placeholder="17:00"/>
          </div>
          {s0&&e0&&calcH(s0,e0)>0&&<div style={{marginTop:'.35rem',fontFamily:'var(--font-m)',fontSize:'.63rem',color:'var(--accent)'}}>{fmtH(pH)} · {fmtP(pP)}</div>}
        </div>

        {/* LOCATION box */}
        <div className="mdl-box">
          <div className="mdl-l">LOCATION</div>
          <div className="mdl-lgrid">
            {LOCS.map(l=>{
              const isSel=loc===l;
              const col=LCOL[l]||LCOL['Other'];
              return(
              <div key={l} className={`mdl-lbtn ${isSel?'sel':''}`}
                style={isSel?{borderColor:col,color:col}:{}}
                onClick={()=>{
                  if(l==='Other'){setLoc('Other');setOtherName('');}
                  else{setLoc(l);setOtherName('');if(l==='Boiler Shop'){setS0('17:45');setE0('23:30');}else if(l==='O2 City Hall'){setS0('18:00');setE0('23:00');}}
                }}>
                <span>{LICO[l]}</span>{l}
              </div>);
            })}
            {/* MORE VENUES — sits next to Other in the grid */}
            <div onClick={()=>setShowMoreLocs(v=>!v)}
              className="mdl-lbtn"
              style={{borderStyle:'dashed',borderColor:EXTRA_LOCS.includes(loc)?'var(--purple)':'var(--border2)',color:EXTRA_LOCS.includes(loc)?'var(--purple)':'var(--muted)',justifyContent:'space-between'}}>
              <span style={{fontSize:'.72rem',overflow:'hidden',textOverflow:'ellipsis',flex:1,fontFamily:'var(--font-b)',fontWeight:700,letterSpacing:'.03em'}}>
                {EXTRA_LOCS.includes(loc)?`${LICO[loc]} ${loc}`:'+ More'}
              </span>
              <span style={{fontSize:'.62rem',display:'inline-block',transform:showMoreLocs?'rotate(180deg)':'rotate(0deg)',transition:'transform .2s',flexShrink:0}}>&#9662;</span>
            </div>
          </div>
          {showMoreLocs&&<div className="mdl-lgrid" style={{marginTop:'.4rem',animation:'fadeIn .15s ease'}}>
            {EXTRA_LOCS.map(l=>{
              const isSel=loc===l;
              const col=venueColor(l);
              return(
              <div key={l} className={`mdl-lbtn ${isSel?'sel':''}`}
                style={isSel?{borderColor:col,color:col}:{borderColor:'var(--border2)',color:'var(--muted)'}}
                onClick={()=>{setLoc(l);setOtherName('');}}>
                <span>{LICO[l]}</span>{l}
              </div>);
            })}
          </div>}
          {loc==='Other'&&<input
            className="mdl-i-sm"
            style={{marginTop:'.5rem',width:'100%'}}
            type="text"
            placeholder="Enter venue name..."
            value={otherName}
            onChange={e=>setOtherName(e.target.value)}
            autoFocus
          />}
        </div>

        {/* NOTES box */}
        <div className="mdl-box">
          <div className="mdl-l">NOTES (OPTIONAL)</div>
          <textarea className="mdl-notes" rows={2} value={note} onChange={e=>setNote(e.target.value)} placeholder=""/>
        </div>

        {!isNew ? (
          <div style={{display:'flex',gap:'.5rem',marginTop:'.25rem'}}>
            <button className="mdl-del" style={{margin:0,flex:1}} onClick={()=>onDelete(shift.id)}>DELETE</button>
            <button className="mdl-save edit" style={{flex:1,marginTop:0}} disabled={!s0||!e0||calcH(s0,e0)<=0} onClick={doSave}>SAVE</button>
          </div>
        ) : (
          <button className="mdl-save" disabled={!s0||!e0||calcH(s0,e0)<=0} onClick={doSave}>SAVE</button>
        )}
      </div>
    </div>
  );
}

/* ── SHIFT ROW — tap to edit ── */
function ShiftRow({s, onEdit}){
  const col=venueColor(s.loc);
  const fmt24=t=>{if(!t)return'';const[h,m]=t.split(':');return`${h.padStart(2,'0')}:${m.padStart(2,'0')}`;};
  return(
    <div className="sr-wrap">
      <div className="sr" onClick={()=>onEdit(s)}>
        <div className="sr-bar" style={{background:col}}/>
        <div className="sr-info">
          <div className="sr-line">
            <span className="sr-time">{fmt24(s.start)} – {fmt24(s.end)}</span>
            <span className="sr-dot">·</span>
            <span className="sr-ico">{LICO[s.loc]}</span>
            <span className="sr-venue" style={{color:col}}>{s.loc}</span>

/* ── APPLICATIONS TAB ── */
const APP_STORE_KEY='job-application-log-v1';

function AppsTab(){
  const[rows,setRows]=useState([]);
  const[newDate,setNewDate]=useState(TODAY);
  const[newCount,setNewCount]=useState('');
  const[editingId,setEditingId]=useState(null);
  const[editCount,setEditCount]=useState('');
  const[loaded,setLoaded]=useState(false);

  useEffect(()=>{
    try{const d=localStorage.getItem(APP_STORE_KEY);if(d)setRows(JSON.parse(d));}catch{}
    setLoaded(true);
  },[]);

  useEffect(()=>{
    if(!loaded)return;
    try{localStorage.setItem(APP_STORE_KEY,JSON.stringify(rows));}catch{}
  },[rows,loaded]);

  const totalApps=rows.reduce((s,r)=>s+Number(r.count),0);
  const totalDays=rows.length;
  const fmtD=ds=>{if(!ds)return'';const[y,m,d]=ds.split('-');return`${d}/${m}/${y}`;};

  function addRow(){
    if(!newDate||!newCount||isNaN(Number(newCount))||Number(newCount)<0)return;
    const existing=rows.find(r=>r.date===newDate);
    if(existing){
      setRows(rows.map(r=>r.date===newDate?{...r,count:Number(r.count)+Number(newCount)}:r));
    }else{
      setRows([...rows,{id:Date.now(),date:newDate,count:Number(newCount)}]
        .sort((a,b)=>b.date.localeCompare(a.date)));
    }
    setNewCount('');
    setNewDate(TODAY);
  }

  function deleteRow(id){setRows(rows.filter(r=>r.id!==id));}

  function saveEdit(id){
    if(!editCount||isNaN(Number(editCount))||Number(editCount)<0)return;
    setRows(rows.map(r=>r.id===id?{...r,count:Number(editCount)}:r));
    setEditingId(null);
  }

  return(
    <div className="screen"><div style={{padding:'.85rem .85rem 0',animation:'up .2s ease'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'.4rem',marginBottom:'.75rem'}}>
        {[
          {lbl:'TOTAL DAYS',val:totalDays,col:'var(--green)'},
          {lbl:'TOTAL APPLIED',val:totalApps,col:'var(--accent)'},
          {lbl:'AVG / DAY',val:totalDays?(totalApps/totalDays).toFixed(1):'—',col:'var(--gold)'},
        ].map(({lbl,val,col})=>(
          <div key={lbl} style={{background:'var(--s1)',border:'1px solid var(--border)',borderTop:`2px solid ${col}`,padding:'.8rem .75rem',borderRadius:'7px',textAlign:'center'}}>
            <div style={{fontFamily:'var(--font-m)',fontSize:'.55rem',color:'var(--muted)',letterSpacing:'.1em',marginBottom:'.25rem'}}>{lbl}</div>
            <div style={{fontFamily:'var(--font-d)',fontSize:'1.6rem',color:col,lineHeight:1}}>{val}</div>
          </div>
        ))}
      </div>
      <div style={{background:'var(--s1)',border:'1px solid var(--border)',padding:'1rem',marginBottom:'.65rem',borderRadius:'7px'}}>
        <div style={{fontFamily:'var(--font-m)',fontSize:'.65rem',color:'var(--accent)',letterSpacing:'.1em',marginBottom:'.6rem'}}>ADD ENTRY</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr auto auto',gap:'.4rem',alignItems:'center'}}>
          <input type="date" value={newDate} onChange={e=>setNewDate(e.target.value)} className="dinp" style={{fontSize:'.82rem'}}/>
          <input type="number" min="0" placeholder="# apps" value={newCount}
            onChange={e=>setNewCount(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&addRow()}
            className="finp" style={{width:'80px',textAlign:'center'}}/>
          <button onClick={addRow}
            style={{fontFamily:'var(--font-d)',fontSize:'1rem',letterSpacing:'.08em',padding:'.5rem .9rem',border:'none',cursor:'pointer',background:'var(--green)',color:'#fff',borderRadius:'5px',whiteSpace:'nowrap'}}>
            + ADD
          </button>
        </div>
      </div>
      <div style={{background:'var(--s1)',border:'1px solid var(--border)',borderRadius:'7px',overflow:'hidden',marginBottom:'.65rem'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr auto',background:'var(--s2)',padding:'.6rem .9rem',fontFamily:'var(--font-m)',fontSize:'.58rem',color:'var(--muted)',letterSpacing:'.12em',borderBottom:'1px solid var(--border)'}}>
          <span>DATE</span><span>APPLICATIONS</span><span style={{width:30}}/>
        </div>
        {rows.length===0&&(
          <div style={{padding:'2.5rem 1rem',color:'var(--dim)',fontFamily:'var(--font-m)',fontSize:'.7rem',textAlign:'center',letterSpacing:'.06em'}}>
            NO ENTRIES YET — ADD YOUR FIRST DAY ABOVE
          </div>
        )}
        {rows.map((row,i)=>(
          <div key={row.id} style={{display:'grid',gridTemplateColumns:'1fr 1fr auto',padding:'.75rem .9rem',alignItems:'center',background:i%2===0?'var(--bg)':'var(--s1)',borderBottom:'1px solid var(--border)',transition:'background .1s'}}>
            <span style={{fontFamily:'var(--font-m)',fontSize:'.78rem',color:'var(--muted)'}}>{fmtD(row.date)}</span>
            {editingId===row.id?(
              <div style={{display:'flex',gap:'.3rem',alignItems:'center'}}>
                <input type="number" min="0" value={editCount}
                  onChange={e=>setEditCount(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter')saveEdit(row.id);if(e.key==='Escape')setEditingId(null);}}
                  autoFocus
                  style={{background:'var(--s3)',border:'1px solid var(--accent)',color:'var(--text)',fontFamily:'var(--font-m)',fontSize:'.82rem',padding:'.3rem .5rem',borderRadius:'3px',outline:'none',width:'65px'}}/>
                <button onClick={()=>saveEdit(row.id)} style={{background:'var(--accent)',color:'#000',border:'none',borderRadius:'3px',padding:'.3rem .55rem',cursor:'pointer',fontSize:'.72rem',fontWeight:700}}>✓</button>
                <button onClick={()=>setEditingId(null)} style={{background:'var(--s3)',color:'var(--muted)',border:'none',borderRadius:'3px',padding:'.3rem .45rem',cursor:'pointer',fontSize:'.72rem'}}>✕</button>
              </div>
            ):(
              <span
                style={{fontFamily:'var(--font-d)',fontSize:'1.4rem',color:'var(--accent)',cursor:'pointer',letterSpacing:'.04em'}}
                onDoubleClick={()=>{setEditingId(row.id);setEditCount(row.count);}}
                title="Double-click to edit"
              >{row.count}</span>
            )}
            <button onClick={()=>deleteRow(row.id)}
              style={{background:'transparent',border:'none',color:'var(--dim)',cursor:'pointer',fontSize:'1.1rem',padding:'.1rem .4rem',borderRadius:'3px',transition:'color .15s',width:30}}
              onMouseEnter={e=>e.target.style.color='var(--red)'}
              onMouseLeave={e=>e.target.style.color='var(--dim)'}
            >×</button>
          </div>
        ))}
        {rows.length>0&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr auto',padding:'.75rem .9rem',alignItems:'center',background:'var(--s2)',borderTop:'2px solid var(--border)'}}>
            <span style={{fontFamily:'var(--font-m)',fontSize:'.6rem',color:'var(--muted)',letterSpacing:'.1em'}}>TOTAL ({totalDays} days)</span>
            <span style={{fontFamily:'var(--font-d)',fontSize:'1.6rem',color:'var(--green)',letterSpacing:'.04em'}}>{totalApps}</span>
            <span style={{width:30}}/>
          </div>
        )}
      </div>
      <div style={{fontFamily:'var(--font-m)',fontSize:'.58rem',color:'var(--dim)',letterSpacing:'.06em',textAlign:'center',paddingBottom:'.5rem'}}>TIP: DOUBLE-CLICK A NUMBER TO EDIT IT</div>
    </div></div>
  );
}

/* ── SALARY ROW — double-tap to edit ── */
function SalaryRow({m, actual, isPastMonth, up}){
  const[editing,setEditing]=useState(false);
  const lastTap=useRef(0);
  function handleTap(){
    const now=Date.now();
    if(now-lastTap.current<350){setEditing(true);}
    lastTap.current=now;
  }
  return(
    <div key={m.k} style={{marginBottom:'.5rem',padding:'.6rem .75rem',background:'var(--s2)',border:'1px solid var(--border)',borderRadius:'6px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'.75rem'}}>
        <div style={{flex:'0 0 auto'}}>
          <div style={{fontFamily:'var(--font-b)',fontWeight:700,fontSize:'.95rem',color:'var(--text)'}}>{mkName(m.k)}</div>
          {isPastMonth&&<div style={{fontFamily:'var(--font-m)',fontSize:'.48rem',color:'var(--muted)',marginTop:'1px',letterSpacing:'.04em'}}>MONTH OVER</div>}
        </div>
        <div style={{flex:1,display:'flex',alignItems:'center',gap:'.4rem',justifyContent:'flex-end'}}>
          {actual!==''&&!editing
            ? <span style={{fontFamily:'var(--font-d)',fontSize:'1.2rem',color:'var(--sky)',cursor:'pointer',userSelect:'none'}} onClick={handleTap} title="Double-tap to edit">{fmtP(parseFloat(actual))}</span>
            : <>
                <span style={{fontFamily:'var(--font-m)',fontSize:'.75rem',color:'var(--muted)'}}>£</span>
                <input
                  type="number"
                  inputMode="decimal"
                  step="0.01"
                  min="0"
                  placeholder="0.00"
                  value={actual}
                  autoFocus={editing}
                  onChange={e=>{
                    const val=e.target.value;
                    up(st=>{if(!st.actualPay)st.actualPay={};st.actualPay={...st.actualPay,[m.k]:val===''?null:parseFloat(val)||val};});
                  }}
                  onBlur={()=>setEditing(false)}
                  style={{width:'100px',background:'var(--s3)',border:'1px solid var(--border2)',color:'var(--text)',fontFamily:'var(--font-d)',fontSize:'1.1rem',padding:'.35rem .5rem',borderRadius:'4px',textAlign:'right',outline:'none'}}
                  onFocus={e=>e.target.style.borderColor='var(--sky)'}
                />
              </>
          }
        </div>
      </div>
    </div>
  );
}

function App(){
  const[store,setStore]=useState(()=>loadStore());
  const[tab,setTab]=useState('week');
  const[swipeKey,setSwipeKey]=useState(0);
  function switchTab(id){if(id==='week'||id==='monthly')setSwipeKey(k=>k+1);setTab(id);}
  const[wOff,setWOff]=useState(0);
  const[vm,setVm]=useState(()=>new Date().toISOString().slice(0,7));
  const[sel,setSel]=useState(null);
  const[editShift,setEditShift]=useState(null);
  const[saveFlash,setSaveFlash]=useState(false);
  const[selLoc,setSelLoc]=useState(null);
  const[selTY,setSelTY]=useState(null);
  const[showWkBreak,setShowWkBreak]=useState(false);
  const[showActualPay,setShowActualPay]=useState(false);

  const shifts=store.shifts,weeklyTarget=store.weeklyTarget||0;

  const up=useCallback(fn=>{
    setStore(p=>{const n={...p,shifts:[...p.shifts]};fn(n);saveStore(n);return{...n};});
  },[]);

  const delShift=id=>up(st=>{st.shifts=st.shifts.filter(x=>x.id!==id);setEditShift(null);});

  function saveEdit(updated){
    up(st=>{
      const exists=st.shifts.some(x=>x.id===updated.id);
      if(exists){
        st.shifts=st.shifts.map(x=>x.id===updated.id?updated:x);
      } else {
        st.shifts=[...st.shifts,updated];
      }
      st.shifts=st.shifts.sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start));
    });
    setEditShift(null);
    setSaveFlash(true);setTimeout(()=>setSaveFlash(false),400);
  }

  const wStart=useMemo(()=>{
    const d=new Date(TODAY),day=d.getDay(),m=new Date(d);
    m.setDate(d.getDate()-(day===0?6:day-1)+wOff*7);
    return localDateStr(m);
  },[wOff]);

  const wDates=useMemo(()=>{
    const a=[];for(let i=0;i<7;i++){const d=new Date(wStart);d.setDate(d.getDate()+i);a.push(localDateStr(d));}return a;
  },[wStart]);

  const wShifts=useMemo(()=>shifts.filter(s=>wDates.includes(s.date)),[shifts,wDates]);
  const wHours=useMemo(()=>wShifts.reduce((a,s)=>a+s.hours,0),[wShifts]);
  const wPay=useMemo(()=>wShifts.reduce((a,s)=>a+shiftPay(s),0),[wShifts]);
  const wByDay=useMemo(()=>{const m={};wDates.forEach(d=>{m[d]=wShifts.filter(s=>s.date===d);});return m;},[wDates,wShifts]);

  const mShifts=useMemo(()=>shifts.filter(s=>s.date.startsWith(vm)),[shifts,vm]);
  const mHours=useMemo(()=>mShifts.reduce((a,s)=>a+s.hours,0),[mShifts]);
  const mPay=useMemo(()=>mShifts.reduce((a,s)=>a+shiftPay(s),0),[mShifts]);

  const mByWeek=useMemo(()=>{
    const m={};

  const maxWH=useMemo(()=>Math.max(1,...mByWeek.map(w=>w.hours)),[mByWeek]);

  const mLoc=useMemo(()=>{const m={};mShifts.forEach(s=>{m[s.loc]=(m[s.loc]||0)+s.hours;});return m;},[mShifts]);
  const maxLH=useMemo(()=>Math.max(1,...Object.values(mLoc)),[mLoc]);

  const allM=useMemo(()=>{

      const taxOrd=k=>{const[y,mo]=k.split('-').map(Number);return(+mo>=4?y*100+(+mo):( (y-1)*100+(+mo+12)));};

  function chMon(d){

    ()=>setWOff(o=>o<0?0:o+1),

  const pastWeekRef=useSwipeRef(()=>setWOff(0),()=>{});
  const monthRef=useSwipeRef(()=>chMon(1),()=>chMon(-1));

  const sByDate=useMemo(()=>{const m={};shifts.forEach(s=>{if(!m[s.date])m[s.date]=[];m[s.date].push(s);});return m;},[shifts]);

  return(<>
    <style dangerouslySetInnerHTML={{__html:CSS}}/>

      <div className="topbar">

          </div>}
          {tab==='monthly'&&<div onClick={vm!==new Date().toISOString().slice(0,7)?()=>{setVm(new Date().toISOString().slice(0,7));setSel(null);}:undefined} style={{position:'absolute',left:'50%',transform:'translateX(-50%)',textAlign:'center',cursor:vm!==new Date().toISOString().slice(0,7)?'pointer':'default',userSelect:'none'}}>
            <div style={{fontFamily:'var(--font-d)',fontSize:'1.2rem',letterSpacing:'.06em',color:vm!==new Date().toISOString().slice(0,7)?'var(--gold)':'var(--text)',lineHeight:1,transition:'color .2s',textAlign:'center'}}>{mkName(vm)}</div>
          </div>}

        </div>
      </div>

      {/* WEEK */}
      {tab==='week'&&(wOff<0?(()=>{
        // PAST VIEW — scrollable list of all past weeks
        const now=new Date(TODAY),day=now.getDay(),mon=new Date(now);
        mon.setDate(now.getDate()-(day===0?6:day-1));

        const pastWkMap={};
        pastShifts.forEach(s=>{
          const d=new Date(s.date),dday=d.getDay(),m2=new Date(d);
          m2.setDate(d.getDate()-(dday===0?6:dday-1));

        <div className="screen" ref={pastWeekRef}><div className="w-wrap">
          <div style={{marginBottom:'.65rem'}}></div>

            <div style={{fontFamily:'var(--font-d)',fontSize:'1.1rem',color:'var(--muted)',letterSpacing:'.08em'}}>NO PAST SHIFTS</div>
          </div>}
          {pastWks.map(w=>(
            <div key={w.key} className="stc" style={{borderTop:'2px solid var(--accent)',display:'flex',padding:0,overflow:'hidden',marginBottom:'.5rem'}}>

                <div className="stv" style={{color:'var(--text)',textAlign:'center'}}>{w.wn}</div>
                <div className="stl" style={{textAlign:'center'}}>WEEK</div>
              </div>
              <div style={{flex:1,padding:'.9rem',textAlign:'center'}}>
                <div className="stv" style={{color:'var(--accent)',textAlign:'center'}}>{fmtH(w.hours)}</div>
                <div className="stl" style={{textAlign:'center'}}>HOURS</div>
              </div>
            </div>
          ))}
        </div></div>
        );

      <div className="screen" ref={weekRef}><div className="w-wrap">

          </div>;

          </div>
        </div>

        {sel&&<div className="cdet">
          <div className="cdet-h" style={{cursor:'pointer'}} onClick={()=>setEditShift({date:sel,start:'',end:'',loc:'',note:''})}>
            <div className="cdet-d">{dayName(sel)} {+sel.slice(8)} {mkName(sel.slice(0,7))}{sel===TODAY&&<span className="tdtag" style={{marginLeft:'.5rem'}}>TODAY</span>}</div>

        </div>}

        <div style={{background:'var(--s1)',border:'1px solid var(--border)',borderLeft:'3px solid var(--accent)',padding:'1rem',marginBottom:'.6rem',borderRadius:'7px'}}>

            <div style={{fontFamily:'var(--font-d)',fontSize:'1.05rem',letterSpacing:'.06em',color:'var(--accent)'}}>WEEK BREAKDOWN</div>
            <span style={{color:'var(--accent)',fontSize:'.8rem'}}>{showWkBreak?'▴':'▾'}</span>
          </button>
          {showWkBreak&&<div style={{marginTop:'.75rem'}}>
          {mByWeek.length===0&&<div style={{fontFamily:'var(--font-m)',fontSize:'.68rem',color:'var(--muted)'}}>NO SHIFTS THIS MONTH</div>}
          {mByWeek.map(w=>(
            <div key={w.w} className="wsc" style={{marginBottom:'.35rem',padding:'.7rem .85rem'}}>
              <div>
                <div className="wsc-w">WEEK {w.w}</div>
                <div className="wsc-d">{w.shifts.length} shifts · {w.dates.sort()[0].slice(5)} → {w.dates.sort().slice(-1)[0].slice(5)}</div>
                <div style={{height:'3px',background:'var(--dim)',marginTop:'.45rem',width:'120px',borderRadius:'2px'}}>
                  <div style={{height:'100%',background:'var(--accent)',width:`${w.hours/maxWH*100}%`,transition:'width .5s ease',borderRadius:'2px'}}/>
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <div className="wsc-h">{fmtH(w.hours)}</div>
                <div className="wsc-p">{fmtP(w.pay)}</div>
              </div>
            </div>
          ))}
          </div>}
        </div>

        <div className="locs">
          <div className="loc-t">BY LOCATION</div>
          {Object.entries(mLoc).sort((a,b)=>b[1]-a[1]).map(([l,h])=>(
            <div key={l} className="lr">
              <span className="li">{LICO[l]}</span>
              <span className="ln" style={{color:venueColor(l)}}>{l}</span>
              <div className="lbw"><div className="lb" style={{width:`${h/maxLH*100}%`,background:venueColor(l)}}/></div>
              <span className="lv">{fmtH(h)}</span>
            </div>
          ))}
          {Object.keys(mLoc).length===0&&<div style={{fontFamily:'var(--font-m)',fontSize:'.68rem',color:'var(--muted)'}}>NO DATA</div>}
        </div>
      </div></div>}

      {/* STATS */}
      {tab==='stats'&&<div className="screen"><div className="st-wrap">

        {(()=>{
          // Build tax years from allM
          const taxYearOf=k=>{const[y,mo]=k.split('-').map(Number);return mo>=4?y:y-1;};
          const tyMap={};
          allM.forEach(m=>{
            const ty=taxYearOf(m.k);
            if(!tyMap[ty])tyMap[ty]={ty,hours:0,pay:0,shifts:0,months:[]};
            tyMap[ty].hours+=m.hours;tyMap[ty].pay+=m.pay;tyMap[ty].shifts+=m.shifts;tyMap[ty].months.push(m);
          });
          const taxYears=Object.values(tyMap).sort((a,b)=>b.ty-a.ty);

          // Determine active tax year
          const now=new Date();
          const curTY=now.getMonth()>=3?now.getFullYear():now.getFullYear()-1;
          const activeTY=selTY!==null?selTY:(taxYears.length>0?taxYears[0].ty:curTY);
          const activeTYData=tyMap[activeTY]||{ty:activeTY,hours:0,pay:0,shifts:0,months:[]};

          // Shifts belonging to the active tax year
          const tyStart=new Date(activeTY,3,6);
          const tyEnd=new Date(activeTY+1,3,5);
          const tyShifts=shifts.filter(s=>{const d=new Date(s.date);return d>=tyStart&&d<=tyEnd;});
          // AVG/WEEK: always divide by full FY weeks (6 Apr → 5 Apr), same for current and past years
          const fyWeeks=Math.round((new Date(activeTY+1,3,5)-new Date(activeTY,3,6))/(7*86400000));
          const avgPerWeek=fyWeeks>0?activeTYData.hours/fyWeeks:0;
          // AVG/WEEK for past weeks only (weeks with at least one shift), excluding current week
          const currentWkKey=wkNum(TODAY)+'-'+isoWkYear(TODAY);
          const workedWeekSet=new Set(tyShifts.filter(s=>s.date<TODAY&&(wkNum(s.date)+'-'+isoWkYear(s.date))!==currentWkKey).map(s=>wkNum(s.date)+'-'+isoWkYear(s.date)));
          const workedWeeks=workedWeekSet.size;
          const avgWorkedWeek=workedWeeks>0?tyShifts.filter(s=>s.date<TODAY&&(wkNum(s.date)+'-'+isoWkYear(s.date))!==currentWkKey).reduce((a,s)=>a+s.hours,0)/workedWeeks:0;

          const isCurrentTY=activeTY===curTY;

          const tyLabel=ty=>`${ty}/${String(ty+1).slice(2)}`;

          return(<>
            {/* FINANCIAL YEAR SELECTOR */}
            {taxYears.length>0&&<div style={{marginBottom:'.75rem'}}>
              <div style={{fontFamily:'var(--font-m)',fontSize:'.55rem',color:'var(--muted)',letterSpacing:'.1em',marginBottom:'.4rem'}}>FINANCIAL YEAR</div>
              <div style={{display:'flex',gap:'.4rem',flexWrap:'wrap'}}>

            <div className="stg" style={{marginBottom:'.65rem'}}>

                const taxOrd=k=>{const[y,mo]=k.split('-').map(Number);return mo>=4?y*100+mo:(y-1)*100+mo+12;};
                return taxOrd(a.k)-taxOrd(b.k);
              }).map(m=>{
                const actual=store.actualPay&&store.actualPay[m.k]!=null?store.actualPay[m.k]:'';
                const isPastMonth=m.k<TODAY.slice(0,7);
                return <SalaryRow key={m.k} m={m} actual={actual} isPastMonth={isPastMonth} up={up}/>;
              })}
              {(()=>{
                const totalActual=activeTYData.months.reduce((sum,m)=>{
                  const v=store.actualPay&&store.actualPay[m.k]!=null?parseFloat(store.actualPay[m.k]):null;
                  return v!=null&&!isNaN(v)?sum+v:sum;
                },0);
                const filledMonths=activeTYData.months.filter(m=>store.actualPay&&store.actualPay[m.k]!=null&&!isNaN(parseFloat(store.actualPay[m.k]))).length;
                if(filledMonths===0)return null;
                return(
                  <div style={{borderTop:'1px solid var(--border)',paddingTop:'.55rem'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{fontFamily:'var(--font-m)',fontSize:'.6rem',color:'var(--sky)',letterSpacing:'.06em'}}>TOTAL RECEIVED ({filledMonths} month{filledMonths!==1?'s':''})</span>
                      <span style={{fontFamily:'var(--font-d)',fontSize:'1.2rem',color:'var(--sky)'}}>{fmtP(totalActual)}</span>
                    </div>
                  </div>
                );
              })()}</>}
            </div>}

            {taxYears.length===0&&<div style={{fontFamily:'var(--font-m)',fontSize:'.68rem',color:'var(--muted)'}}>NO DATA YET</div>}

            {/* Location breakdown for selected year */}
            <div className="locs">
              <div className="loc-t">BY LOCATION · {tyLabel(activeTY)}</div>
              {(()=>{
                const lt={};const lp={};
                tyShifts.forEach(s=>{lt[s.loc]=(lt[s.loc]||0)+s.hours;lp[s.loc]=(lp[s.loc]||0)+shiftPay(s);});
                const mx=Math.max(1,...Object.values(lt));
                if(Object.keys(lt).length===0)return<div style={{fontFamily:'var(--font-m)',fontSize:'.68rem',color:'var(--muted)'}}>NO DATA</div>;
                return Object.entries(lt).sort((a,b)=>b[1]-a[1]).map(([l,h])=>{
                  const isSel=selLoc===l;
                  const locShifts=tyShifts.filter(s=>s.loc===l).sort((a,b)=>b.date.localeCompare(a.date)||b.start.localeCompare(a.start));
                  const col=venueColor(l);
                  return(<div key={l}>
                    <div className="lr" style={{cursor:'pointer',padding:'.3rem .2rem',borderRadius:'5px',transition:'background .1s'}} onClick={()=>setSelLoc(isSel?null:l)}>
                      <span className="li">{LICO[l]}</span>
                      <span className="ln" style={{color:col}}>{l}</span>
                      <div className="lbw"><div className="lb" style={{width:`${h/mx*100}%`,background:col}}/></div>
                      <span className="lv">{fmtH(h)}</span>
                      <span style={{fontFamily:'var(--font-m)',fontSize:'.65rem',color:isSel?col:'var(--dim)',marginLeft:'.3rem',transition:'color .15s'}}>{isSel?'▴':'▾'}</span>
                    </div>
                    {isSel&&<div style={{background:'var(--bg)',border:`1px solid ${col}33`,borderRadius:'6px',marginBottom:'.5rem',overflow:'hidden'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'.5rem .75rem',background:`${col}11`,borderBottom:`1px solid ${col}22`}}>
                        <span style={{fontFamily:'var(--font-b)',fontSize:'.85rem',fontWeight:700,color:col}}>{locShifts.length} SHIFTS</span>
                        <span style={{fontFamily:'var(--font-d)',fontSize:'1rem',color:'var(--green)'}}>{fmtP(lp[l])}</span>
                      </div>
                      {locShifts.map(s=>{
                        return(<div key={s.id} style={{display:'flex',alignItems:'center',gap:'.6rem',padding:'.5rem .75rem',borderBottom:'1px solid var(--border)',cursor:'pointer',transition:'background .1s'}}
                          onClick={()=>setEditShift(s)}
                          onMouseEnter={e=>e.currentTarget.style.background='var(--s2)'}
                          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                          <div style={{width:'3px',alignSelf:'stretch',background:col,borderRadius:'2px',flexShrink:0}}/>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontFamily:'var(--font-d)',fontSize:'.95rem',color:'var(--text)',letterSpacing:'.03em'}}>{dayName(s.date)} {+s.date.slice(8)} {mkName(s.date.slice(0,7))}</div>
                            <div style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'var(--muted)',marginTop:'1px'}}>{s.start} – {s.end}{s.note?` · 📝 ${s.note}`:''}</div>
                          </div>
                          <div style={{textAlign:'right',flexShrink:0}}>
                            <div style={{fontFamily:'var(--font-d)',fontSize:'1rem',color:col}}>{fmtH(s.hours)}</div>
                            <div style={{fontFamily:'var(--font-m)',fontSize:'.6rem',color:'var(--green)'}}>{fmtP(shiftPay(s))}</div>
                          </div>
                        </div>);
                      })}
                    </div>}
                  </div>);
                });
              })()}
            </div>
          </>);
        })()}
      </div></div>}

      {/* APPLICATIONS */}
      {tab==='apps'&&<AppsTab/>}

      {/* NAV */}
      <div className="bnav">
        {[{id:'week',ico:'📅',lbl:'WEEK'},{id:'monthly',ico:'🗓️',lbl:'MONTH'},{id:'stats',ico:'📊',lbl:'STATS'},{id:'apps',ico:'📋',lbl:'APPS'}].map(n=>(
          <button key={n.id} className={`bni ${tab===n.id?'act':''}`} onClick={()=>switchTab(n.id)}>
            <span className="bni-ico">{n.ico}</span>{n.lbl}
          </button>
        ))}
      </div>
    </div>

    {/* EDIT SHIFT MODAL */}
    {editShift&&<EditModal shift={editShift} onSave={saveEdit} onDelete={delShift} onClose={()=>setEditShift(null)}/>}

    {/* SAVE FLASH */}
    {saveFlash&&<div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,pointerEvents:'none'}}>
      <div className="save-flash" style={{background:'var(--green)',color:'#fff',fontFamily:'var(--font-d)',fontSize:'1.4rem',letterSpacing:'.1em',padding:'.6rem 1.5rem',borderRadius:'8px',boxShadow:'0 0 30px rgba(29,185,84,.4)'}}>✓ SAVED</div>
    </div>}
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
