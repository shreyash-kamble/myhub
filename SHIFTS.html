<script type="text/babel">
const {useState,useCallback,useMemo,useRef,useEffect}=React;

const LOCS=['TR','Byker','NUFC','Boiler Shop','O2 City Hall','Arena','Other'];
const LCOL={'TR':'#00e5ff','Byker':'#c084fc','NUFC':'#94a3b8','Boiler Shop':'#ff8c00','O2 City Hall':'#3dffa0','Arena':'#ffd600','Other':'#f472b6'};

const uid=(()=>{let i=Date.now();return()=>String(++i);})();

function useSwipeRef(onLeft,onRight){
  const cbL=useRef(onLeft),cbR=useRef(onRight);
  useEffect(()=>{cbL.current=onLeft;},[onLeft]);
  useEffect(()=>{cbR.current=onRight;},[onRight]);
  const ref=useCallback(el=>{
    if(!el)return;
    let sx=null,sy=null;
    function onTS(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;}
    function onTM(e){
      if(sx===null)return;
      const dx=e.touches[0].clientX-sx;
      const dy=e.touches[0].clientY-sy;
      if(Math.abs(dx)>10&&Math.abs(dx)>Math.abs(dy)){e.preventDefault();}
    }
    function onTE(e){
      if(sx===null)return;
      const dx=e.changedTouches[0].clientX-sx;
      const dy=e.changedTouches[0].clientY-sy;
      if(Math.abs(dx)>40&&Math.abs(dx)>Math.abs(dy)){
        if(dx<0)cbL.current();else cbR.current();
      }
      sx=null;sy=null;
    }
    el.addEventListener('touchstart',onTS,{passive:true});
    el.addEventListener('touchmove',onTM,{passive:false});
    el.addEventListener('touchend',onTE,{passive:true});
  },[]);
  return ref;
}
const fmtH=h=>{const w=Math.floor(h),m=Math.round((h-w)*60);return m?`${w}h ${m}m`:`${w}h`;};
const fmtP=n=>`£${n.toFixed(2)}`;
function calcH(s,e){
  if(!s||!e)return 0;
  const[sh,sm]=s.split(':').map(Number);let[eh,em]=e.split(':').map(Number);
  let a=sh*60+sm,b=eh*60+em;
  if(e==='0:00'||e==='00:00')b=1440;
  if(b<=a)b+=1440;
  return Math.round((b-a)/60*100)/100;
}
function wkNum(ds){const d=new Date(ds),j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/86400000+j.getDay()+1)/7);}
function mkKey(ds){return ds.slice(0,7);}
function mkName(mk){const[y,m]=mk.split('-');return`${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]} ${y}`;}
function dayName(ds){return['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date(ds).getDay()];}
const TODAY=new Date().toISOString().slice(0,10);

function loadStore(){try{const r=localStorage.getItem('shifts_v4');if(r){const d=JSON.parse(r);if(!d.weeklyTarget)d.weeklyTarget=0;return d;}}catch(e){}return{shifts:[],hourlyRate:12.21,weeklyTarget:0};}
function saveStore(s){try{localStorage.setItem('shifts_v4',JSON.stringify(s));}catch(e){}}

function calDays(mk){
  const[y,m]=mk.split('-').map(Number);
  const first=new Date(y,m-1,1),last=new Date(y,m,0);
  const off=(first.getDay()+6)%7;
  const days=[];
  for(let i=off-1;i>=0;i--){const d=new Date(y,m-1,-i);days.push({date:d.toISOString().slice(0,10),cur:false});}
  for(let i=1;i<=last.getDate();i++){const d=new Date(y,m-1,i);days.push({date:d.toISOString().slice(0,10),cur:true});}
  while(days.length%7){const l=new Date(days[days.length-1].date);l.setDate(l.getDate()+1);days.push({date:l.toISOString().slice(0,10),cur:false});}
  return days;
}

/* ── 24H TIME INPUT ── */
function TimeInput({value, onChange, placeholder='HH:MM', className}){
  const[raw,setRaw]=useState(value||'');
  const ref=useRef(null);

  // Keep in sync if parent value changes (e.g. reset)
  useEffect(()=>{setRaw(value||'');},[value]);

  function handleChange(e){
    let v=e.target.value.replace(/[^0-9:]/g,'');
    // Auto-insert colon after 2 digits
    if(v.length===2&&raw.length===1&&!v.includes(':'))v=v+':';
    // Limit to HH:MM
    if(v.length>5)return;
    setRaw(v);
    // Validate & emit
    const m=v.match(/^([01]?\d|2[0-3]):([0-5]\d)$/);
    if(m){
      const hh=m[1].padStart(2,'0'),mm=m[2];
      onChange(`${hh}:${mm}`);
    } else if(v===''){
      onChange('');
    }
  }

  function handleBlur(){
    // Try to fix partial input on blur
    const m=raw.match(/^([01]?\d|2[0-3]):([0-5]\d)$/);
    if(m){
      const fixed=`${m[1].padStart(2,'0')}:${m[2]}`;
      setRaw(fixed);
      onChange(fixed);
    } else if(raw&&!raw.match(/^([01]?\d|2[0-3]):([0-5]\d)$/)){
      // invalid — clear
      setRaw('');onChange('');
    }
  }

  function handleKeyDown(e){
    if(e.key==='Backspace'&&raw.endsWith(':'))setRaw(raw.slice(0,-1));
  }

  return(
    <input
      ref={ref}
      className={className}
      type="text"
      inputMode="numeric"
      placeholder={placeholder}
      value={raw}
      onChange={handleChange}
      onBlur={handleBlur}
      onKeyDown={handleKeyDown}
      maxLength={5}
      autoComplete="off"
    />
  );
}

.pb{background:var(--s1);border:1px solid var(--border);border-left:3px solid var(--green);padding:1rem;margin-bottom:.65rem;border-radius:7px;}
.pb-t{font-family:var(--font-d);font-size:1.05rem;letter-spacing:.06em;color:var(--muted);margin-bottom:.6rem;}
.pb-r{display:flex;justify-content:space-between;align-items:center;padding:.38rem 0;border-bottom:1px solid var(--border);}
.pb-r:last-child{border-bottom:none;}
.pb-l{font-family:var(--font-b);font-size:.95rem;font-weight:700;color:var(--text2);}
.pb-v{font-family:var(--font-d);font-size:1.15rem;color:var(--green);}

/* export row */
.export-row{display:flex;gap:.5rem;margin-bottom:.65rem;}
.exp-btn{flex:1;font-family:var(--font-d);font-size:.95rem;letter-spacing:.08em;padding:.6rem .5rem;border:1px solid var(--border2);background:var(--s1);color:var(--text2);cursor:pointer;border-radius:5px;transition:all .15s;text-align:center;}
.exp-btn:active{border-color:var(--accent);color:var(--accent);}

/* weekly target progress */
.wtarget{background:var(--s1);border:1px solid var(--border);border-left:3px solid var(--purple);padding:.75rem 1rem;margin-bottom:.65rem;border-radius:7px;}
.wt-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.45rem;}
.wt-lbl{font-family:var(--font-m);font-size:.6rem;color:var(--muted);letter-spacing:.08em;}
.wt-val{font-family:var(--font-d);font-size:1rem;color:var(--purple);}
.wt-bar{height:6px;background:var(--dim);border-radius:3px;overflow:hidden;}
.wt-fill{height:100%;border-radius:3px;transition:width .5s ease;}

/* save flash */
@keyframes savePop{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
.save-flash{animation:savePop .35s ease;}

/* today pill */
.today-pill{font-family:var(--font-m);font-size:.55rem;color:var(--accent);border:1px solid rgba(0,229,255,.35);background:rgba(0,229,255,.08);padding:.2rem .55rem;cursor:pointer;border-radius:12px;letter-spacing:.06em;white-space:nowrap;}
.today-pill:active{background:rgba(0,229,255,.2);}




/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:100;display:flex;align-items:center;justify-content:center;padding:1.25rem;}
.mdl{background:var(--s1);border:1px solid var(--border);padding:1.5rem;width:100%;max-width:340px;animation:pop .2s ease;border-radius:9px;max-height:90vh;overflow-y:auto;}
.mdl-t{font-family:var(--font-d);font-size:1.6rem;letter-spacing:.06em;margin-bottom:.3rem;color:var(--text);}
.mdl-s{font-family:var(--font-m);font-size:.65rem;color:var(--muted);margin-bottom:1rem;}
.mdl-l{font-family:var(--font-m);font-size:.65rem;color:var(--muted);letter-spacing:.08em;margin-bottom:.35rem;margin-top:.75rem;}
.mdl-i{width:100%;background:var(--s3);border:1px solid var(--border2);color:var(--text);font-family:var(--font-d);font-size:1.5rem;padding:.6rem .75rem;letter-spacing:.04em;border-radius:5px;}
.mdl-i:focus{outline:none;border-color:var(--green);}
.mdl-i-sm{width:100%;background:var(--s3);border:1px solid var(--border2);color:var(--text);font-family:var(--font-m);font-size:.88rem;padding:.5rem .65rem;border-radius:4px;}
.mdl-i-sm:focus{outline:none;border-color:var(--accent);}
.mdl-trow{display:grid;grid-template-columns:1fr 20px 1fr;gap:.4rem;align-items:center;}
.mdl-tsep{font-family:var(--font-d);font-size:1.1rem;color:var(--muted);text-align:center;}
.mdl-lgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.3rem;margin-top:.35rem;}
.mdl-lbtn{display:flex;align-items:center;gap:.25rem;padding:.45rem .35rem;border:1px solid var(--border2);background:var(--s2);cursor:pointer;font-family:var(--font-b);font-size:.8rem;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;border-radius:4px;transition:all .15s;}
.mdl-lbtn.sel{background:rgba(255,255,255,.05);}
.mdl-notes{width:100%;background:var(--s3);border:1px solid var(--border2);color:var(--text);font-family:var(--font-m);font-size:.78rem;padding:.48rem .65rem;border-radius:4px;resize:none;line-height:1.4;}
.mdl-notes:focus{outline:none;border-color:var(--accent);}
.mdl-notes::placeholder{color:var(--muted);}
.mdl-bs{display:flex;gap:.5rem;margin-top:1.25rem;}
.mdl-b{flex:1;font-family:var(--font-d);font-size:1rem;letter-spacing:.08em;padding:.65rem;border:1px solid var(--border2);background:var(--s2);color:var(--text);cursor:pointer;border-radius:5px;}
.mdl-b.ok{background:var(--green);border-color:var(--green);color:#000;}
.mdl-b.danger{background:var(--red);border-color:var(--red);color:#fff;}
`;

/* ── EDIT MODAL ── */
function EditModal({shift, rate, onSave, onDelete, onClose}){
  const isNew=!shift.id;
  const[date,setDate]=useState(shift.date);
  const[s0,setS0]=useState(shift.start||'');
  const[e0,setE0]=useState(shift.end||'');
  const[loc,setLoc]=useState(shift.loc||'TR');
  const[note,setNote]=useState(shift.note||'');
  const pH=calcH(s0,e0),pP=pH*rate;
  function doSave(){
    if(!s0||!e0||pH<=0)return;
    onSave({...shift,id:shift.id||uid(),date,start:s0,end:e0,loc,hours:pH,note});
  }
  return(
    <div className="mo" onClick={onClose}>
      <div className="mdl" onClick={e=>e.stopPropagation()}>
        <div className="mdl-t">{isNew?'ADD SHIFT':'EDIT SHIFT'}</div>
        <div className="mdl-s">{isNew?`Adding shift for ${dayName(date)} ${+date.slice(8)} ${mkName(date.slice(0,7))}`:'Update the details below'}</div>
        <div className="mdl-l">DATE</div>
        <input className="mdl-i-sm" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
        <div className="mdl-l">SHIFT TIME</div>
        <div className="mdl-trow">
          <TimeInput className="mdl-i-sm" value={s0} onChange={setS0} placeholder="09:00"/>
          <div className="mdl-tsep">→</div>
          <TimeInput className="mdl-i-sm" value={e0} onChange={setE0} placeholder="17:00"/>
        </div>
        {s0&&e0&&pH>0&&<div style={{marginTop:'.4rem',fontFamily:'var(--font-m)',fontSize:'.65rem',color:'var(--accent)'}}>{fmtH(pH)} · {fmtP(pP)}</div>}
        <div className="mdl-l">LOCATION</div>
        <div className="mdl-lgrid">
          {LOCS.map(l=>(
            <div key={l} className={`mdl-lbtn ${loc===l?'sel':''}`}
              style={loc===l?{borderColor:LCOL[l],color:LCOL[l]}:{}}
              onClick={()=>setLoc(l)}>
              <span>{LICO[l]}</span>{l}
            </div>
          ))}
        </div>
        <div className="mdl-l">NOTES (OPTIONAL)</div>
        <textarea className="mdl-notes" rows={2} value={note} onChange={e=>setNote(e.target.value)} placeholder=""/>
        <div className="mdl-bs">
          {!isNew&&<button className="mdl-b danger" onClick={()=>onDelete(shift.id)}>DELETE</button>}
          <button className="mdl-b" onClick={onClose}>CANCEL</button>
          <button className="mdl-b ok" disabled={!s0||!e0||pH<=0} onClick={doSave}>SAVE</button>
        </div>
      </div>
    </div>
  );
}

/* ── SHIFT ROW — tap to edit ── */
function ShiftRow({s, rate, onDel, onEdit}){
  const col=LCOL[s.loc]||'#888';
  const fmt24=t=>{if(!t)return'';const[h,m]=t.split(':');return`${h.padStart(2,'0')}:${m.padStart(2,'0')}`;};
  return(
    <div className="sr-wrap">
      <div className="sr" onClick={()=>onEdit(s)}>
        <div className="sr-bar" style={{background:col}}/>
        <div className="sr-info">
          <div className="sr-line">
            <span className="sr-time">{fmt24(s.start)} – {fmt24(s.end)}</span>
            <span className="sr-dot">·</span>
            <span className="sr-ico">{LICO[s.loc]}</span>
            <span className="sr-venue" style={{color:col}}>{s.loc}</span>
          </div>
          {s.note&&<div className="sr-note">📝 {s.note}</div>}
        </div>
        <div className="sr-right">
          <div className="sr-hrs" style={{color:col}}>{fmtH(s.hours)}</div>
          <div className="sr-pay">{fmtP(s.hours*rate)}</div>
        </div>
      </div>
    </div>
  );
}

function App(){
  const[store,setStore]=useState(()=>loadStore());
  const[tab,setTab]=useState('week');
  const[date,setDate]=useState(new Date().toISOString().slice(0,10));
  const[s0,setS0]=useState('');
  const[e0,setE0]=useState('');
  const[loc,setLoc]=useState('TR');
  const[note,setNote]=useState('');
  const[ok,setOk]=useState(false);
  const[wOff,setWOff]=useState(0);
  const[vm,setVm]=useState(()=>new Date().toISOString().slice(0,7));
  const[showR,setShowR]=useState(false);
  const[rIn,setRIn]=useState('');
  const[tgtIn,setTgtIn]=useState('');
  const[sel,setSel]=useState(null);
  const[showTax,setShowTax]=useState(true);
  const[editShift,setEditShift]=useState(null);
  const[copyMsg,setCopyMsg]=useState('');
  const[saveFlash,setSaveFlash]=useState(false);

  const up=useCallback(fn=>{
    setStore(p=>{const n={...p,shifts:[...p.shifts]};fn(n);saveStore(n);return{...n};});
  },[]);

  function addShift(){
    const h=calcH(s0,e0);if(!h||h<=0)return;
    up(st=>{st.shifts=[...st.shifts,{id:uid(),date,start:s0,end:e0,loc,hours:h,note}].sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start));});
    setS0('');setE0('');setNote('');setOk(true);setTimeout(()=>setOk(false),700);
  }
  const delShift=id=>up(st=>{st.shifts=st.shifts.filter(x=>x.id!==id);setEditShift(null);});
  function saveRate(){
    const r=parseFloat(rIn);if(r>0)up(st=>{st.hourlyRate=r;});
    const t=parseFloat(tgtIn);up(st=>{st.weeklyTarget=t>=0?t:st.weeklyTarget||0;});
    setShowR(false);
  }

  function saveEdit(updated){
    up(st=>{
      const exists=st.shifts.some(x=>x.id===updated.id);
      if(exists){
        st.shifts=st.shifts.map(x=>x.id===updated.id?updated:x);
      } else {
        st.shifts=[...st.shifts,updated];
      }
      st.shifts=st.shifts.sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start));
    });
    setEditShift(null);
    setSaveFlash(true);setTimeout(()=>setSaveFlash(false),400);
  }

  function exportCSV(){
    const rows=[['Date','Day','Start','End','Hours','Pay','Location','Notes']];
    shifts.forEach(s=>{
      rows.push([s.date,dayName(s.date),s.start,s.end,s.hours.toFixed(2),(s.hours*rate).toFixed(2),s.loc,s.note||'']);
    });
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='shifts.csv';a.click();
  }

  function copySummary(){
    const lines=[`SHIFTS SUMMARY — as of ${TODAY}`,`Total Hours: ${fmtH(tHours)}`,`Total Earned: ${fmtP(tHours*rate)}`,`Total Shifts: ${shifts.length}`,`Hourly Rate: £${rate.toFixed(2)}/hr`,'','MONTHLY BREAKDOWN:'];
    allM.forEach(m=>lines.push(`  ${mkName(m.k)}: ${fmtH(m.hours)} · ${fmtP(m.hours*rate)} (${m.shifts} shifts)`));
    navigator.clipboard.writeText(lines.join('\n')).then(()=>{setCopyMsg('COPIED!');setTimeout(()=>setCopyMsg(''),1500);});
  }

  const rate=store.hourlyRate,shifts=store.shifts,weeklyTarget=store.weeklyTarget||0;

  const wStart=useMemo(()=>{
    const d=new Date(),day=d.getDay(),m=new Date(d);
    m.setDate(d.getDate()-(day===0?6:day-1)+wOff*7);
    return m.toISOString().slice(0,10);
  },[wOff]);

  const wDates=useMemo(()=>{
    const a=[];for(let i=0;i<7;i++){const d=new Date(wStart);d.setDate(d.getDate()+i);a.push(d.toISOString().slice(0,10));}return a;
  },[wStart]);

  const wShifts=useMemo(()=>shifts.filter(s=>wDates.includes(s.date)),[shifts,wDates]);
  const wHours=useMemo(()=>wShifts.reduce((a,s)=>a+s.hours,0),[wShifts]);
  const wByDay=useMemo(()=>{const m={};wDates.forEach(d=>{m[d]=wShifts.filter(s=>s.date===d);});return m;},[wDates,wShifts]);

  const mShifts=useMemo(()=>shifts.filter(s=>s.date.startsWith(vm)),[shifts,vm]);
  const mHours=useMemo(()=>mShifts.reduce((a,s)=>a+s.hours,0),[mShifts]);
  const mPay=mHours*rate;

  const mByWeek=useMemo(()=>{
    const m={};
    mShifts.forEach(s=>{const w=wkNum(s.date);if(!m[w])m[w]={w,hours:0,shifts:[],dates:[]};m[w].hours+=s.hours;m[w].shifts.push(s);if(!m[w].dates.includes(s.date))m[w].dates.push(s.date);});
    return Object.values(m).sort((a,b)=>a.w-b.w);
  },[mShifts]);
  const maxWH=useMemo(()=>Math.max(1,...mByWeek.map(w=>w.hours)),[mByWeek]);

  const mLoc=useMemo(()=>{const m={};mShifts.forEach(s=>{m[s.loc]=(m[s.loc]||0)+s.hours;});return m;},[mShifts]);
  const maxLH=useMemo(()=>Math.max(1,...Object.values(mLoc)),[mLoc]);

  const tHours=useMemo(()=>shifts.reduce((a,s)=>a+s.hours,0),[shifts]);
  const allM=useMemo(()=>{
    const m={};shifts.forEach(s=>{const k=mkKey(s.date);if(!m[k])m[k]={k,hours:0,shifts:0};m[k].hours+=s.hours;m[k].shifts++;});
    return Object.values(m).sort((a,b)=>b.k.localeCompare(a.k));
  },[shifts]);

  const upcomingShifts=useMemo(()=>shifts.filter(s=>s.date>TODAY).sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start)).slice(0,5),[shifts]);
  const nextShift=upcomingShifts[0]||null;
  function daysUntil(ds){const d=new Date(ds),t=new Date(TODAY);return Math.round((d-t)/86400000);}

  const taxEst=useMemo(()=>{
    const annual=tHours*rate;
    const pa=12570,br=50270;
    const taxable=Math.max(0,annual-pa);
    const incomeTax=Math.min(taxable,br-pa)*0.2+Math.max(0,taxable-(br-pa))*0.4;
    const ni=Math.max(0,annual-12570)*0.08;
    const net=annual-incomeTax-ni;
    return{annual,incomeTax,ni,net,monthly:net/12,weekly:net/52};
  },[tHours,rate]);

  function chMon(d){
    const[y,m]=vm.split('-').map(Number),nd=new Date(y,m-1+d,1);
    setVm(`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}`);setSel(null);
  }

  const wLabel=useMemo(()=>{
    const fmt=d=>`${d.slice(8)} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+d.slice(5,7)-1]}`;
    return`${fmt(wDates[0])} – ${fmt(wDates[6])}`;
  },[wDates]);

  const weekRef=useSwipeRef(()=>setWOff(o=>o+1),()=>setWOff(o=>o-1));
  const monthRef=useSwipeRef(()=>chMon(1),()=>chMon(-1));
  const cDays=useMemo(()=>calDays(vm),[vm]);
  const sByDate=useMemo(()=>{const m={};shifts.forEach(s=>{if(!m[s.date])m[s.date]=[];m[s.date].push(s);});return m;},[shifts]);
  const selS=sel?(sByDate[sel]||[]):[];
  const selH=selS.reduce((a,s)=>a+s.hours,0);

  const pH=calcH(s0,e0),pP=pH*rate;

  return(<>
    <style>{CSS}</style>
    <div className="app">

      <div className="topbar">
        <div className="tb-inner">
          <div style={{display:'flex',alignItems:'center',gap:'.6rem'}}>
            <a href="index.html" style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'var(--muted)',border:'1px solid var(--border2)',background:'var(--s2)',padding:'.28rem .55rem',textDecoration:'none',borderRadius:'4px',letterSpacing:'.06em',lineHeight:1,display:'flex',alignItems:'center',gap:'.3rem'}}>← HUB</a>
            <div className="title">SHI<span>FT</span>S</div>
          </div>
          <button className="rate-btn" onClick={()=>{setRIn(String(rate));setTgtIn(String(weeklyTarget||''));setShowR(true);}}>
            <span className="rate-btn-lbl">RATE</span>
            £{rate.toFixed(2)}/HR
          </button>
        </div>
      </div>

      {/* ADD */}
      {tab==='add'&&<div className="screen"><div className="add-wrap">
        <div className="fcard">
          <div className="flbl">DATE</div>
          <input className="dinp" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
        </div>
        <div className="fcard">
          <div className="flbl">SHIFT TIME</div>
          <div className="trow">
            <TimeInput className="finp" value={s0} onChange={setS0} placeholder="09:00"/>
            <div className="tsep">→</div>
            <TimeInput className="finp" value={e0} onChange={setE0} placeholder="17:00"/>
          </div>
          {s0&&e0&&pH>0&&<div style={{marginTop:'.5rem',fontFamily:'var(--font-m)',fontSize:'.67rem',color:'var(--accent)'}}>{fmtH(pH)} · ends {e0==='00:00'?'00:00':e0}</div>}
        </div>
        <div className="fcard">
          <div className="flbl">LOCATION</div>
          <div className="lgrid">
            {LOCS.map(l=>(
              <div key={l} className={`lbtn ${loc===l?'sel':''}`}
                style={loc===l?{borderColor:LCOL[l],color:LCOL[l]}:{}}
                onClick={()=>setLoc(l)}>
                <span>{LICO[l]}</span>{l}
              </div>
            ))}
          </div>
        </div>
        <div className="fcard">
          <div className="flbl">NOTES (OPTIONAL)</div>
          <textarea className="notes-inp" rows={2} value={note} onChange={e=>setNote(e.target.value)} placeholder=""/>
        </div>
        {pH>0&&<div className="prev">
          <div><div className="pv-l">HOURS</div><div className="pv-h">{fmtH(pH)}</div></div>
          <div style={{textAlign:'right'}}><div className="pv-l">EST. PAY</div><div className="pv-p">{fmtP(pP)}</div></div>
        </div>}
        <button className={`add-btn ${ok?'ok':''}`} disabled={!s0||!e0||pH<=0} onClick={addShift}>{ok?'✓ SHIFT ADDED':'LOG SHIFT'}</button>
      </div></div>}

      {/* WEEK */}
      {tab==='week'&&<div className="screen" ref={weekRef}><div className="w-wrap">
        <div className="wnav">
          <button className="wnbtn" onClick={()=>setWOff(o=>o-1)}>◀</button>
          <div>
            <div className="wntit">{wOff===0?'THIS WEEK':wOff===-1?'LAST WEEK':wOff<0?`${Math.abs(wOff)} WKS AGO`:`${wOff} WKS AHEAD`}</div>
            <div className="wnsub">{wLabel}</div>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'.3rem'}}>
            <button className="wnbtn" onClick={()=>setWOff(o=>o+1)}>▶</button>
            {wOff!==0&&<button className="today-pill" onClick={()=>setWOff(0)}>TODAY</button>}
          </div>
        </div>
        <div className="who">
          <div className="wc" style={{borderTop:'2px solid var(--accent)'}}><div className="wcv" style={{color:'var(--accent)'}}>{fmtH(wHours)}</div><div className="wcl">TOTAL HRS</div></div>
          <div className="wc" style={{borderTop:'2px solid var(--green)'}}><div className="wcv" style={{color:'var(--green)',fontSize:'1.3rem'}}>{wHours>0?fmtP(wHours*rate):'£0.00'}</div><div className="wcl">GROSS PAY</div></div>
          <div className="wc" style={{borderTop:'2px solid var(--gold)'}}><div className="wcv" style={{color:'var(--gold)'}}>{wShifts.length}</div><div className="wcl">SHIFTS</div></div>
        </div>
        {weeklyTarget>0&&(()=>{const pct=Math.min(100,wHours/weeklyTarget*100),done=wHours>=weeklyTarget,rem=Math.max(0,weeklyTarget-wHours);return(
          <div className="wtarget">
            <div className="wt-row">
              <span className="wt-lbl">WEEKLY TARGET · {fmtH(weeklyTarget)}</span>
              <span className="wt-val">{done?'✓ DONE':`${fmtH(rem)} left`}</span>
            </div>
            <div className="wt-bar">
              <div className="wt-fill" style={{width:`${pct}%`,background:done?'var(--green)':'var(--purple)'}}/>
            </div>
          </div>
        );})()}
        {wShifts.length===0&&<div style={{background:'var(--s1)',border:'1px dashed var(--border2)',borderRadius:'8px',padding:'2rem',textAlign:'center',marginBottom:'.5rem'}}>
          <div style={{fontSize:'2rem',marginBottom:'.5rem'}}>📅</div>
          <div style={{fontFamily:'var(--font-d)',fontSize:'1.2rem',color:'var(--muted)',letterSpacing:'.08em'}}>NO SHIFTS THIS WEEK</div>
          <div style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'var(--dim)',marginTop:'.35rem',letterSpacing:'.06em'}}>TAP A DAY TO LOG ONE</div>
        </div>}
        {wDates.map(d=>{
          const ds=wByDay[d]||[],dh=ds.reduce((a,s)=>a+s.hours,0),has=ds.length>0,isT=d===TODAY,isFut=d>TODAY,isPast=d<TODAY;
          return<div key={d} className={`db${isT?' td':''}`}>
            <div className="dbh" style={{cursor:'pointer'}} onClick={()=>setEditShift({date:d,start:'',end:'',loc:'TR',note:''})}>
              <div style={{display:'flex',alignItems:'center',gap:'.4rem'}}>
                <span className="dbh-d" style={isPast?{color:'var(--muted)'}:{}}>{dayName(d)} <span className="dbh-n" style={isPast?{color:'var(--muted)'}:{}}>{d.slice(8)}</span></span>
                {isT&&<span className="tdtag">TODAY</span>}
                {isFut&&!isT&&<span style={{fontFamily:'var(--font-m)',fontSize:'.48rem',background:'rgba(255,214,0,.12)',color:'var(--gold)',padding:'.1rem .32rem',borderRadius:'3px',letterSpacing:'.06em'}}>UPCOMING</span>}
              </div>
              {has&&<div className="dbh-t">{fmtH(dh)}</div>}
            </div>
            {has
              ? isPast
                ? ds.map(s=>(
                  <div key={s.id} className="sr-compact" onClick={()=>setEditShift(s)}>
                    <div className="sr-cdot" style={{background:LCOL[s.loc]||'#888'}}/>
                    <span className="sr-cico">{LICO[s.loc]}</span>
                    <span className="sr-cloc" style={{color:LCOL[s.loc]||'#888'}}>{s.loc}</span>
                    <span className="sr-chrs" style={{color:LCOL[s.loc]||'#888'}}>{fmtH(s.hours)}</span>
                    <span className="sr-cpay">{fmtP(s.hours*rate)}</span>
                  </div>
                ))
                : ds.map(s=><ShiftRow key={s.id} s={s} rate={rate} onDel={delShift} onEdit={setEditShift}/>)
              : <div className="eday">no shifts</div>
            }
          </div>;
        })}
      </div></div>}

      {/* MONTHLY */}
      {tab==='monthly'&&<div className="screen" ref={monthRef}><div className="m-wrap">
        <div className="mnav">
          <button className="mnbtn" onClick={()=>chMon(-1)}>◀</button>
          <div className="mtit">{mkName(vm)}</div>
          <button className="mnbtn" onClick={()=>chMon(1)}>▶</button>
        </div>

        <div className="mhero">
          <div className="mh-row">
            <div>
              <div className="mh-lbl">TOTAL HOURS</div>
              <div className="mh-val">{fmtH(mHours)}</div>
              <div className="mh-lbl" style={{marginTop:'.5rem'}}>GROSS PAY</div>
              <div className="mh-pay">{fmtP(mPay)}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontFamily:'var(--font-m)',fontSize:'.65rem',color:'var(--purple)',letterSpacing:'.08em'}}>SHIFTS</div>
              <div style={{fontFamily:'var(--font-d)',fontSize:'1.7rem',color:'var(--purple)'}}>{mShifts.length}</div>
              <div style={{fontFamily:'var(--font-m)',fontSize:'.65rem',color:'var(--accent)',letterSpacing:'.08em',marginTop:'.5rem'}}>AVG/SHIFT</div>
              <div style={{fontFamily:'var(--font-d)',fontSize:'1.4rem',color:'var(--accent)'}}>{mShifts.length>0?fmtH(mHours/mShifts.length):'—'}</div>
            </div>
          </div>
        </div>

        {/* CALENDAR */}
        <div className="cal">
          <div className="cal-hdr">{['MON','TUE','WED','THU','FRI','SAT','SUN'].map(d=><div key={d} className="cal-dow">{d}</div>)}</div>
          <div className="cal-grid">
            {cDays.map(({date:cd,cur})=>{
              const cs=sByDate[cd]||[],ch=cs.reduce((a,s)=>a+s.hours,0);
              const isT=cd===TODAY,isSel=cd===sel,hasS=cs.length>0&&cur;
              const cls=['cc',!cur?'om':'',hasS?'hs':'',isT?'it':'',isSel?'sl':''].filter(Boolean).join(' ');
              return<div key={cd} className={cls} onClick={()=>{
                if(!cur)return;
                if(cs.length===0){setEditShift({date:cd,start:'',end:'',loc:'TR',note:''});}
                else{setSel(isSel?null:cd);}
              }}>
                <div className="cn">{+cd.slice(8)}</div>
                {cs.slice(0,3).map((s,i)=><div key={i} style={{width:'100%',height:'4px',borderRadius:'2px',background:LCOL[s.loc]||'#888',opacity:cur?.9:.15}}/>)}
                {cs.length>1&&cur&&<div className="cbadge">{cs.length} shifts</div>}
                {cs.length===1&&cur&&<div className="cbadge">{fmtH(cs[0].hours)}</div>}
                {cs.length===0&&cur&&<div style={{fontSize:'.65rem',color:'var(--dim)',marginTop:'auto',lineHeight:1}}>+</div>}
              </div>;
            })}
          </div>
        </div>

        {sel&&<div className="cdet">
          <div className="cdet-h">
            <div className="cdet-d">{dayName(sel)} {+sel.slice(8)} {mkName(sel.slice(0,7))}{sel===TODAY&&<span className="tdtag" style={{marginLeft:'.5rem'}}>TODAY</span>}</div>
            <div style={{display:'flex',alignItems:'center',gap:'.6rem'}}>
              {selH>0&&<div className="cdet-t">{fmtH(selH)}</div>}
              <button onClick={()=>setEditShift({date:sel,start:'',end:'',loc:'TR',note:''})} style={{fontFamily:'var(--font-d)',fontSize:'.85rem',letterSpacing:'.06em',background:'rgba(0,229,255,.12)',border:'1px solid rgba(0,229,255,.3)',color:'var(--accent)',padding:'.2rem .55rem',borderRadius:'4px',cursor:'pointer'}}>+ ADD</button>
            </div>
          </div>
          {selS.length===0?<div className="eday">— no shifts —</div>:selS.map(s=><ShiftRow key={s.id} s={s} rate={rate} onDel={delShift} onEdit={setEditShift}/>)}
        </div>}

        {/* WEEK BREAKDOWN */}
        <div style={{background:'var(--s1)',border:'1px solid var(--border)',borderLeft:'3px solid var(--accent)',padding:'1rem',marginBottom:'.6rem',borderRadius:'7px'}}>
          <div style={{fontFamily:'var(--font-d)',fontSize:'1.05rem',letterSpacing:'.06em',color:'var(--accent)',marginBottom:'.75rem'}}>WEEK BREAKDOWN</div>
          {mByWeek.length===0&&<div style={{fontFamily:'var(--font-m)',fontSize:'.68rem',color:'var(--muted)'}}>NO SHIFTS THIS MONTH</div>}
          {mByWeek.map(w=>(
            <div key={w.w} className="wsc" style={{marginBottom:'.35rem',padding:'.7rem .85rem'}}>
              <div>
                <div className="wsc-w">WEEK {w.w}</div>
                <div className="wsc-d">{w.shifts.length} shifts · {w.dates.sort()[0].slice(5)} → {w.dates.sort().slice(-1)[0].slice(5)}</div>
                <div style={{height:'3px',background:'var(--dim)',marginTop:'.45rem',width:'120px',borderRadius:'2px'}}>
                  <div style={{height:'100%',background:'var(--accent)',width:`${w.hours/maxWH*100}%`,transition:'width .5s ease',borderRadius:'2px'}}/>
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <div className="wsc-h">{fmtH(w.hours)}</div>
                <div className="wsc-p">{fmtP(w.hours*rate)}</div>
              </div>
            </div>
          ))}
        </div>

        <div className="locs">
          <div className="loc-t">BY LOCATION</div>
          {Object.entries(mLoc).sort((a,b)=>b[1]-a[1]).map(([l,h])=>(
            <div key={l} className="lr">
              <span className="li">{LICO[l]}</span>
              <span className="ln" style={{color:LCOL[l]||'#888'}}>{l}</span>
              <div className="lbw"><div className="lb" style={{width:`${h/maxLH*100}%`,background:LCOL[l]||'#888'}}/></div>
              <span className="lv">{fmtH(h)}</span>
            </div>
          ))}
          {Object.keys(mLoc).length===0&&<div style={{fontFamily:'var(--font-m)',fontSize:'.68rem',color:'var(--muted)'}}>NO DATA</div>}
        </div>
      </div></div>}

      {/* STATS */}
      {tab==='stats'&&<div className="screen"><div className="st-wrap">
        <div style={{fontFamily:'var(--font-d)',fontSize:'1.9rem',letterSpacing:'.06em',marginBottom:'.65rem',color:'var(--text)'}}>ALL TIME</div>
        <div className="stg">
          <div className="stc" style={{borderTop:'2px solid var(--accent)'}}><div className="stv" style={{color:'var(--accent)'}}>{fmtH(tHours)}</div><div className="stl">TOTAL HOURS</div></div>
          <div className="stc" style={{borderTop:'2px solid var(--green)'}}><div className="stv" style={{color:'var(--green)',fontSize:'1.4rem'}}>{fmtP(tHours*rate)}</div><div className="stl">TOTAL EARNED</div></div>
          <div className="stc" style={{borderTop:'2px solid var(--gold)'}}><div className="stv" style={{color:'var(--gold)'}}>{shifts.length}</div><div className="stl">TOTAL SHIFTS</div></div>
          <div className="stc" style={{borderTop:'2px solid var(--purple)'}}><div className="stv" style={{color:'var(--purple)',fontSize:'1.4rem'}}>{shifts.length>0?fmtH(tHours/shifts.length):'—'}</div><div className="stl">AVG/SHIFT</div></div>
        </div>

        {/* TAX ESTIMATE — collapsible */}
        <div style={{background:'var(--s1)',border:'1px solid var(--border)',borderLeft:'3px solid var(--orange)',padding:'1rem',marginBottom:'.65rem',borderRadius:'7px'}}>
          <button onClick={()=>setShowTax(v=>!v)} style={{width:'100%',background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',padding:0}}>
            <div style={{fontFamily:'var(--font-d)',fontSize:'1.05rem',letterSpacing:'.06em',color:'var(--orange)'}}>TAX ESTIMATE</div>
            <div style={{display:'flex',alignItems:'center',gap:'.65rem'}}>
              <div style={{fontFamily:'var(--font-m)',fontSize:'.55rem',color:'var(--muted)',letterSpacing:'.06em'}}>UK 2024/25 · APPROX</div>
              <span style={{color:'var(--orange)',fontSize:'.8rem'}}>{showTax?'▴':'▾'}</span>
            </div>
          </button>
          {showTax&&<>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.4rem',marginBottom:'.6rem',marginTop:'.65rem'}}>
            <div style={{background:'var(--s2)',border:'1px solid var(--border2)',padding:'.65rem .75rem',borderRadius:'6px'}}>
              <div style={{fontFamily:'var(--font-m)',fontSize:'.55rem',color:'var(--muted)',letterSpacing:'.07em',marginBottom:'.2rem'}}>GROSS / YEAR</div>
              <div style={{fontFamily:'var(--font-d)',fontSize:'1.25rem',color:'var(--text)'}}>{fmtP(taxEst.annual)}</div>
            </div>
            <div style={{background:'rgba(61,255,160,.06)',border:'1px solid rgba(61,255,160,.2)',padding:'.65rem .75rem',borderRadius:'6px'}}>
              <div style={{fontFamily:'var(--font-m)',fontSize:'.55rem',color:'var(--green)',letterSpacing:'.07em',marginBottom:'.2rem'}}>EST. TAKE-HOME</div>
              <div style={{fontFamily:'var(--font-d)',fontSize:'1.25rem',color:'var(--green)'}}>{fmtP(taxEst.net)}</div>
            </div>
          </div>
          <div style={{borderTop:'1px solid var(--border)',paddingTop:'.6rem',display:'flex',flexDirection:'column',gap:'.3rem'}}>
            {[{l:'Income Tax',v:taxEst.incomeTax,c:'var(--red)'},{l:'Nat. Insurance (~8%)',v:taxEst.ni,c:'var(--orange)'},{l:'Monthly take-home',v:taxEst.monthly,c:'var(--green)'},{l:'Weekly take-home',v:taxEst.weekly,c:'var(--accent)'}].map(({l,v,c})=>(
              <div key={l} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontFamily:'var(--font-m)',fontSize:'.65rem',color:'var(--muted)',letterSpacing:'.04em'}}>{l}</span>
                <span style={{fontFamily:'var(--font-d)',fontSize:'1.05rem',color:c}}>{fmtP(v)}</span>
              </div>
            ))}
          </div>
          <div style={{marginTop:'.55rem',fontFamily:'var(--font-m)',fontSize:'.55rem',color:'var(--dim)',letterSpacing:'.04em',lineHeight:1.4}}>Based on projected annual hours at current rate. Income tax free allowance £12,570. Figures are estimates only.</div>
          </>}
        </div>

        <div className="pb">
          <div className="pb-t">PAY BREAKDOWN · £{rate.toFixed(2)}/HR</div>
          {allM.map(m=>(
            <div key={m.k} className="pb-r">
              <div className="pb-l">{mkName(m.k)}</div>
              <div style={{textAlign:'right'}}>
                <div className="pb-v">{fmtP(m.hours*rate)}</div>
                <div style={{fontFamily:'var(--font-m)',fontSize:'.62rem',color:'var(--muted)'}}>{fmtH(m.hours)} · {m.shifts} shifts</div>
              </div>
            </div>
          ))}
          {allM.length===0&&<div style={{fontFamily:'var(--font-m)',fontSize:'.68rem',color:'var(--muted)'}}>NO DATA YET</div>}
        </div>
        <div className="locs">
          <div className="loc-t">ALL TIME BY LOCATION</div>
          {(()=>{
            const lt={};shifts.forEach(s=>{lt[s.loc]=(lt[s.loc]||0)+s.hours;});const mx=Math.max(1,...Object.values(lt));
            return Object.entries(lt).sort((a,b)=>b[1]-a[1]).map(([l,h])=>(
              <div key={l} className="lr">
                <span className="li">{LICO[l]}</span>
                <span className="ln" style={{color:LCOL[l]||'#888'}}>{l}</span>
                <div className="lbw"><div className="lb" style={{width:`${h/mx*100}%`,background:LCOL[l]||'#888'}}/></div>
                <span className="lv">{fmtH(h)}</span>
              </div>
            ));
          })()}
        </div>
      </div></div>}

      {/* NAV */}
      <div className="bnav">
        {[{id:'add',ico:'➕',lbl:'ADD'},{id:'week',ico:'📅',lbl:'WEEK'},{id:'monthly',ico:'🗓️',lbl:'MONTH'},{id:'stats',ico:'📊',lbl:'STATS'}].map(n=>(
          <button key={n.id} className={`bni ${tab===n.id?'act':''}`} onClick={()=>setTab(n.id)}>
            <span className="bni-ico">{n.ico}</span>{n.lbl}
          </button>
        ))}
      </div>
    </div>

    {/* HOURLY RATE MODAL */}
    {showR&&<div className="mo" onClick={()=>setShowR(false)}>
      <div className="mdl" onClick={e=>e.stopPropagation()}>
        <div className="mdl-t">SETTINGS</div>
        <div className="mdl-s">Hourly rate & weekly hours target</div>
        <div className="mdl-l">HOURLY RATE (£)</div>
        <input className="mdl-i" type="number" inputMode="decimal" step="0.01" value={rIn} onChange={e=>setRIn(e.target.value)} placeholder={rate.toFixed(2)}/>
        <div className="mdl-l">WEEKLY HOURS TARGET</div>
        <input className="mdl-i" type="number" inputMode="decimal" step="0.5" value={tgtIn} onChange={e=>setTgtIn(e.target.value)} placeholder="e.g. 40"/>
        <div style={{fontFamily:'var(--font-m)',fontSize:'.55rem',color:'var(--muted)',marginTop:'.35rem',letterSpacing:'.04em'}}>Set to 0 to hide the progress bar</div>
        <div className="mdl-bs">
          <button className="mdl-b" onClick={()=>setShowR(false)}>CANCEL</button>
          <button className="mdl-b ok" onClick={saveRate}>SAVE</button>
        </div>
      </div>
    </div>}

    {/* EDIT SHIFT MODAL */}
    {editShift&&<EditModal shift={editShift} rate={rate} onSave={saveEdit} onDelete={delShift} onClose={()=>setEditShift(null)}/>}

    {/* SAVE FLASH */}
    {saveFlash&&<div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,pointerEvents:'none'}}>
      <div className="save-flash" style={{background:'var(--green)',color:'#000',fontFamily:'var(--font-d)',fontSize:'1.4rem',letterSpacing:'.1em',padding:'.6rem 1.5rem',borderRadius:'8px',boxShadow:'0 0 30px rgba(61,255,160,.5)'}}>✓ SAVED</div>
    </div>}
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
