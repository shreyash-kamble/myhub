<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080808">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>HUB</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500;700&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#080808;overflow:hidden;}
:root{
  --bg:#080808;--s1:#111111;--s2:#181818;--s3:#1e1e1e;
  --border:#2a2a2a;--border2:#333;
  --red:#ff3d00;--orange:#ff8c00;--green:#39d98a;--blue:#00c8ff;--yellow:#ffd600;--purple:#c084fc;
  --text:#f5f5f5;--text2:#d0d0d0;--text3:#a8a8a8;--dim:#444;--muted:#888;--faint:#2a2a2a;
  --font-d:'Bebas Neue',sans-serif;--font-m:'JetBrains Mono',monospace;--font-b:'Barlow Condensed',sans-serif;
}
::-webkit-scrollbar{width:2px;}::-webkit-scrollbar-thumb{background:var(--dim);}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:var(--font-b);position:relative;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.blob{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.12;pointer-events:none;z-index:0;animation:bpulse 8s ease-in-out infinite;}
.blob1{width:400px;height:400px;background:var(--blue);top:-100px;left:-100px;animation-delay:0s;}
.blob2{width:350px;height:350px;background:var(--red);bottom:-80px;right:-80px;animation-delay:3s;}
.blob3{width:250px;height:250px;background:var(--purple);top:50%;left:60%;animation-delay:6s;}
@keyframes bpulse{0%,100%{transform:scale(1);opacity:0.12;}50%{transform:scale(1.15);opacity:0.18;}}
@keyframes cardIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.container{position:relative;z-index:1;width:100%;max-width:480px;padding:32px 20px;display:flex;flex-direction:column;align-items:center;gap:40px;}

/* HEADER */
.header{text-align:center;}
.header-eyebrow{font-family:var(--font-m);font-size:10px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:10px;}
.header-eyebrow::before,.header-eyebrow::after{content:'';display:block;width:30px;height:1px;background:var(--border2);}
.header-title{font-family:var(--font-d);font-size:clamp(72px,18vw,100px);letter-spacing:6px;color:var(--text);line-height:0.9;}
.header-title span{background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-sub{font-family:var(--font-m);font-size:11px;color:var(--muted);letter-spacing:2px;margin-top:12px;}

/* CARDS */
.cards{width:100%;display:flex;flex-direction:column;gap:12px;}
.card{display:flex;align-items:center;gap:20px;padding:20px 24px;background:var(--s1);border:1px solid var(--border);border-radius:4px;text-decoration:none;position:relative;overflow:hidden;transition:border-color 0.2s,background 0.2s,transform 0.15s;cursor:pointer;}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--card-color,var(--blue));transition:width 0.2s;}
.card:hover,.card:active{background:var(--s2);border-color:var(--card-color,var(--blue));transform:translateX(4px);}
.card:hover::before,.card:active::before{width:4px;}
.card-active{animation:cardIn 0.5s ease both;}
.card-icon{font-size:28px;min-width:40px;text-align:center;line-height:1;}
.card-body{flex:1;}
.card-title{font-family:var(--font-d);font-size:28px;letter-spacing:2px;color:var(--text);line-height:1;margin-bottom:4px;}
.card-desc{font-family:var(--font-m);font-size:10px;color:var(--muted);letter-spacing:1px;}
.card-live{font-family:var(--font-m);font-size:9px;letter-spacing:0.5px;margin-top:5px;padding:2px 7px;border-radius:2px;display:inline-block;}
.card-arrow{font-family:var(--font-m);font-size:14px;color:var(--dim);transition:color 0.2s,transform 0.2s;flex-shrink:0;}
.card:hover .card-arrow,.card:active .card-arrow{color:var(--card-color,var(--blue));transform:translateX(4px);}

/* HEADER TAP EXPORT */
@keyframes exppulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.header-sub.exporting{color:var(--yellow);animation:exppulse 0.6s ease infinite;}

/* TOAST */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--green);color:var(--green);font-family:var(--font-m);font-size:10px;letter-spacing:1px;padding:8px 16px;border-radius:3px;z-index:9999;white-space:nowrap;animation:slideUp 0.2s ease;pointer-events:none;}
.toast.err{border-color:var(--red);color:var(--red);}
.toast.hidden{display:none;}

.footer{font-family:var(--font-m);font-size:9px;color:var(--faint);letter-spacing:3px;text-transform:uppercase;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:999;}
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>
<div class="toast hidden" id="toast"></div>

<div class="container">

  <div class="header" onclick="runExport(false)" style="cursor:pointer;">
    <div class="header-eyebrow">personal dashboard</div>
    <div class="header-title">MY<br><span>HUB</span></div>
    <div class="header-sub" id="header-sub">TAP TO BACKUP · SELECT MODULE</div>
  </div>

  <div class="cards">

    <a class="card card-active" href="GYM_PLAN.html" style="--card-color:#b2ff59;animation-delay:0.1s">
      <div class="card-icon">💪</div>
      <div class="card-body">
        <div class="card-title">PPL BEAST</div>
        <div class="card-desc">GYM PLAN · WORKOUT TRACKER</div>
        <div class="card-live" id="gym-live" style="background:rgba(178,255,89,0.08);color:#b2ff59;display:none"></div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a class="card card-active" href="SHIFTS.html" style="--card-color:#00e5ff;animation-delay:0.2s">
      <div class="card-icon">⏱️</div>
      <div class="card-body">
        <div class="card-title">SHIFTS</div>
        <div class="card-desc">WORK SCHEDULE · TIME TRACKING</div>
        <div class="card-live" id="shifts-live" style="background:rgba(0,229,255,0.08);color:#00e5ff;display:none"></div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a class="card card-active" href="EXPENSES.html" style="--card-color:#ff3d00;animation-delay:0.3s">
      <div class="card-icon">💸</div>
      <div class="card-body">
        <div class="card-title">SPENT</div>
        <div class="card-desc">EXPENSES · BUDGET TRACKER</div>
        <div class="card-live" id="spent-live" style="background:rgba(255,61,0,0.08);color:#ff3d00;display:none"></div>
      </div>
      <div class="card-arrow">→</div>
    </a>

  </div>

  <div class="footer" id="footer-ver">v2.0 · personal use only</div>

</div>

<script>
// ─────────────────────────────────────────────
// STORAGE KEY for backup log
// ─────────────────────────────────────────────
const BACKUP_LOG_KEY = 'hub_backup_log';

function getBackupLog() {
  try { return JSON.parse(localStorage.getItem(BACKUP_LOG_KEY) || '[]'); } catch(e) { return []; }
}
function saveBackupLog(log) {
  try { localStorage.setItem(BACKUP_LOG_KEY, JSON.stringify(log.slice(-30))); } catch(e) {} // keep last 30
}

// ─────────────────────────────────────────────
// STATS (unchanged from your original)
// ─────────────────────────────────────────────
function weekDates(){
  const now=new Date(),day=now.getDay();
  const mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1));
  const out=[];
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);out.push(d.toISOString().slice(0,10));}
  return out;
}

function loadStats(){
  const wDates=weekDates();
  try{
    const g=JSON.parse(localStorage.getItem('pplbeast_v3')||'null');
    if(g&&g.weeks&&g.currentWeek){
      const wd=g.weeks[g.currentWeek]||[];
      const done=wd.filter(d=>d.done).length;
      const el=document.getElementById('gym-live');
      if(done>0){el.textContent=done+'/'+wd.length+' days done · Week '+g.currentWeek;el.style.display='inline-block';}
    }
  }catch(e){}
  try{
    const s=JSON.parse(localStorage.getItem('shifts_v4')||'null');
    if(s&&s.shifts){
      const now=new Date();
      const today=now.toISOString().slice(0,10);
      const nowMins=now.getHours()*60+now.getMinutes();
      const el=document.getElementById('shifts-live');
      const card=document.querySelector('a[href="SHIFTS.html"]');
      const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const mons=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      // Check if currently mid-shift
      const activeShift=s.shifts.find(x=>{
        if(x.date!==today) return false;
        const startM=parseInt(x.start)*60+(parseInt((x.start.split(':')[1])||0));
        let endM=parseInt(x.end)*60+(parseInt((x.end.split(':')[1])||0));
        if(endM<=startM) endM+=1440;
        return nowMins>=startM && nowMins<endM;
      });
      if(activeShift){
        el.textContent='🟢 ON SHIFT · ends '+activeShift.end+(activeShift.loc?' · '+activeShift.loc:'');
        el.style.color='#39d98a';
        el.style.display='inline-block';
        if(card) card.style.setProperty('--card-color','#39d98a');
      } else {
        if(card) card.style.setProperty('--card-color','#00e5ff');
        const upcoming=s.shifts.filter(x=>{
          if(x.date>today) return true;
          if(x.date<today) return false;
          const parts=x.start.split(':');
          const shiftMins=parseInt(parts[0])*60+parseInt(parts[1]||0);
          return shiftMins>nowMins;
        }).sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start));
        if(upcoming.length>0){
          const lines=upcoming.slice(0,2).map((x,i)=>{
            const dow=days[new Date(x.date+'T12:00:00').getDay()];
            const dd=+x.date.slice(8);
            const mon=mons[+x.date.slice(5,7)-1];
            const label=x.date===today?'Today':i===0?'Next':dow+' '+dd+' '+mon;
            return label+': '+x.start+(x.loc?' · '+x.loc:'');
          });
          el.textContent=lines.join('  |  ');
          el.style.color='';
          el.style.display='inline-block';
        } else {
          el.style.display='none';
        }
      }
    }
  }catch(e){}
  try{
    const e=JSON.parse(localStorage.getItem('spent_v2')||'null');
    if(e&&e.expenses){
      const wt=e.expenses.filter(x=>wDates.includes(x.date)).reduce((a,x)=>a+x.amount,0);
      const budget=e.weekBudget||200;
      const left=budget-wt;
      if(wt>0){
        const el=document.getElementById('spent-live');
        el.textContent=left>=0?'£'+left.toFixed(0)+' left of £'+budget+' budget':'£'+Math.abs(left).toFixed(0)+' over budget!';
        el.style.color=left<0?'#ff3d00':'#39d98a';
        el.style.display='inline-block';
      }
    }
  }catch(e){}
}

// ─────────────────────────────────────────────
// EXPORT CORE
// ─────────────────────────────────────────────
function gatherAllData() {
  const snapshot = {
    exportedAt: new Date().toISOString(),
    exportedDate: new Date().toISOString().slice(0, 10),
    sources: {}
  };

  const keys = {
    gym:      'pplbeast_v3',
    shifts:   'shifts_v4',
    expenses: 'spent_v2'
  };

  for (const [name, key] of Object.entries(keys)) {
    try {
      const raw = localStorage.getItem(key);
      snapshot.sources[name] = raw ? JSON.parse(raw) : null;
    } catch(e) {
      snapshot.sources[name] = null;
    }
  }

  return snapshot;
}

function downloadJSON(data, filename) {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// isMidnight = true means this was triggered by the auto scheduler
function runExport(isMidnight) {
  const sub = document.getElementById('header-sub');

  sub.textContent = 'SAVING BACKUP...';
  sub.classList.add('exporting');

  setTimeout(() => {
    try {
      const data = gatherAllData();
      const fileDate = data.exportedDate;
      const filename = `hub-backup-${fileDate}.json`;

      downloadJSON(data, filename);

      const log = getBackupLog();
      log.push({ ts: data.exportedAt, date: fileDate, auto: isMidnight });
      saveBackupLog(log);

      updateBackupUI();
      showToast(isMidnight ? '✓ MIDNIGHT BACKUP SAVED' : '✓ BACKUP SAVED');
    } catch(err) {
      showToast('✗ EXPORT FAILED', true);
    }

    sub.classList.remove('exporting');
    updateBackupUI();
  }, 300);
}

// ─────────────────────────────────────────────
// MIDNIGHT SCHEDULER
// ─────────────────────────────────────────────
let midnightTimer = null;

function msUntilMidnight() {
  const now  = new Date();
  const next = new Date(now);
  next.setHours(24, 0, 0, 0); // next midnight (start of tomorrow)
  return next - now;
}

function scheduleMidnightExport() {
  if (midnightTimer) clearTimeout(midnightTimer);

  const ms = msUntilMidnight();

  midnightTimer = setTimeout(() => {
    runExport(true);
    // reschedule for the following midnight
    scheduleMidnightExport();
  }, ms);
}

// ─────────────────────────────────────────────
// STATUS UI
// ─────────────────────────────────────────────
function updateBackupUI() {
  const sub    = document.getElementById('header-sub');
  const footer = document.getElementById('footer-ver');
  const log    = getBackupLog();

  if (log.length === 0) {
    sub.textContent    = 'TAP TO BACKUP · SELECT MODULE';
    footer.textContent = 'v2.0 · never backed up';
    return;
  }

  const last     = log[log.length - 1];
  const lastDate = new Date(last.ts);
  const today    = new Date().toISOString().slice(0, 10);
  const wasToday = last.date === today;
  const timeStr  = lastDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const label    = last.auto ? 'auto' : 'manual';

  sub.textContent = 'TAP TO BACKUP · SELECT MODULE';

  if (wasToday) {
    footer.textContent = `✓ backed up today @ ${timeStr} (${label})`;
    footer.style.color = 'var(--green)';
  } else {
    footer.textContent = `last backup: ${last.date} @ ${timeStr}`;
    footer.style.color = '';
  }
}

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
let _toastTimer = null;
function showToast(msg, isErr) {
  const el = document.getElementById('toast');
  clearTimeout(_toastTimer);
  el.textContent = msg;
  el.className   = 'toast' + (isErr ? ' err' : '');
  _toastTimer = setTimeout(() => { el.className = 'toast hidden'; }, 2500);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
loadStats();
updateBackupUI();
scheduleMidnightExport();
// Refresh shift display every minute so started shifts disappear automatically
setInterval(loadStats, 60000);

// ─────────────────────────────────────────────
// RE-SCHEDULE if page was hidden and comes back
// (e.g. phone locked, then unlocked after midnight)
// ─────────────────────────────────────────────
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    scheduleMidnightExport();
    updateBackupUI();
  }
});
</script>
</body>
</html>
